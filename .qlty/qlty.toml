# =============================================================================
# Qlty Configuration for Origa Project
# =============================================================================
# Tech Stack: Rust workspace (origa, utils, tokenizer) + Leptos/WASM (origa_ui) + 
#             Tauri v2 desktop (tauri) + Playwright E2E (end2end)
# =============================================================================

config_version = "0"

# =============================================================================
# EXCLUDE PATTERNS
# =============================================================================
exclude_patterns = [
    # ----- Rust Build Artifacts -----
    "**/target/**",
    "**/Cargo.lock",
    
    # ----- WASM / Leptos -----
    "**/dist/**",
    "**/dist-gen/**",
    "**/pkg/**",
    "**/*.wasm",
    "**/*.wat",
    
    # ----- Tauri -----
    "**/src-tauri/target/**",
    "**/*.exe",
    
    # ----- Node / TypeScript -----
    "**/node_modules/**",
    "**/.yarn/**",
    "**/*.min.*",
    "**/*_min.*",
    "*-min.*",
    
    # ----- Generated Files -----
    "**/generated/**",
    "**/*.generated.rs",
    "**/*.generated.ts",
    "**/*.d.ts",
    
    # ----- E2E Test Artifacts -----
    "**/end2end/test-results/**",
    "**/end2end/playwright-report/**",
    "**/end2end/.playwright/**",
    
    # ----- IDE / Editor -----
    "**/.vscode/**",
    "**/.idea/**",
    
    # ----- Version Control -----
    "**/.git/**",
    
    # ----- Misc -----
    "**/assets/**",
    "**/cache/**",
    "**/protos/**",
    "**/testdata/**",
]

# =============================================================================
# TEST PATTERNS
# =============================================================================
test_patterns = [
    # ----- Rust Tests -----
    "**/tests/**",
    "**/*_test.rs",
    "**/*_tests.rs",
    "**/src/**/tests/**",
    
    # ----- Playwright E2E -----
    "**/end2end/**/*.spec.ts",
    "**/end2end/**/*.test.ts",
    "**/e2e/**/*.spec.ts",
    
    # ----- General Test Patterns -----
    "**/test/**",
    "**/spec/**",
    "**/*.test.*",
    "**/*.spec.*",
    "**/test_*.*",
]

# =============================================================================
# SMELL DETECTION
# =============================================================================
[smells]
mode = "comment"

[smells.function_complexity]
threshold = 20

[smells.function_parameters]
threshold = 6

[smells.return_statements]
threshold = 8

[smells.nested_control_flow]
threshold = 6

[smells.boolean_logic]
threshold = 6

[smells.duplication]
nodes_threshold = 60

# =============================================================================
# COVERAGE CONFIGURATION
# =============================================================================
[coverage]
ignores = [
    "**/*.generated.rs",
    "**/*.generated.ts",
    "**/fixtures/**",
    "**/mocks/**",
    "**/end2end/**",
]

# =============================================================================
# SOURCE CONFIGURATION
# =============================================================================
[[source]]
name = "default"
default = true

# =============================================================================
# PLUGINS
# =============================================================================

# ----- RUST ECOSYSTEM -----
[[plugin]]
name = "clippy"
mode = "comment"

# ----- SECURITY SCANNING (HIGH PRIORITY) -----
[[plugin]]
name = "gitleaks"
mode = "block"

[[plugin]]
name = "trufflehog"
mode = "block"

[[plugin]]
name = "osv-scanner"
mode = "monitor"

[[plugin]]
name = "semgrep"
mode = "comment"

# ----- INFRASTRUCTURE / IaC -----
[[plugin]]
name = "actionlint"
mode = "comment"

[[plugin]]
name = "hadolint"
mode = "comment"

[[plugin]]
name = "shellcheck"
mode = "comment"

# ----- CODE SEARCH -----
[[plugin]]
name = "ripgrep"
mode = "comment"

# ----- DOCUMENTATION -----
[[plugin]]
name = "markdownlint"
mode = "monitor"

# =============================================================================
# TRIAGE RULES
# =============================================================================

[[triage]]
match.file_patterns = ["**/*.generated.rs"]
set.ignored = true

[[triage]]
match.file_patterns = ["**/src-tauri/**"]
set.level = "low"

[[triage]]
match.file_patterns = ["**/end2end/**"]
set.level = "low"

[[triage]]
match.plugins = ["clippy"]
match.file_patterns = ["**/origa_ui/**"]
set.level = "medium"

[[triage]]
match.plugins = ["clippy"]
match.rules = ["clippy::arc_with_dispatch"]
set.level = "low"