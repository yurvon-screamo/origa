<!doctype html>
<html lang="ru">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#3d4535" />
  <meta name="description" content="Japanese language learning application" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="Origa" />

  <title>オリガ</title>

  <link rel="icon" type="image/png" href="public/logo.png" />
  <link rel="apple-touch-icon" href="public/logo-192.png" />
  <link rel="manifest" href="public/manifest.json" />
  <link data-trunk rel="tailwind-css" href="input.css" />
  <link data-trunk rel="copy-dir" href="public" />
  <link data-trunk rel="rust" data-wasm-opt="z"
    data-wasm-opt-params="--enable-bulk-memory --enable-nontrapping-float-to-int" />

</head>

<body class="min-h-screen paper-texture">
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('/public/sw.js')
          .then((reg) => console.log('SW registered:', reg.scope))
          .catch((err) => console.log('SW registration failed:', err));
      });
    }
  </script>
</body>

</html>
