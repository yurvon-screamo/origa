<!doctype html>
<html lang="ru">
    <head>
        <meta charset="utf-8" />
        <meta
            name="viewport"
            content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"
        />
        <meta name="theme-color" content="#3d4535" />
        <meta
            name="description"
            content="Japanese language learning application"
        />

        <title>オリガ</title>

        <link rel="preload" href="https://s3.origa.uwuwu.net/fonts/noto-sans-jp-400-a1fd00ef.woff2" as="font" type="font/woff2" crossorigin />
        <link rel="preload" href="https://s3.origa.uwuwu.net/fonts/noto-serif-jp-400-6c031ceb.woff2" as="font" type="font/woff2" crossorigin />

        <style>
            /* Boot splash: static HTML visible before WASM instantiates, so the
               WebView never paints an empty cream background during cold start
               (especially slow on Android). Hidden from WASM once App mounts.
               Inline styles + hardcoded colors: cannot rely on input.css CSS
               variables or CDN fonts at first paint. System serif fallback for
               the katakana wordmark is acceptable for a <1s transient layer. */
            #origa-boot-splash {
                position: fixed;
                inset: 0;
                z-index: 9999;
                display: flex;
                flex-direction: column;
                align-items: center;
                justify-content: center;
                gap: 28px;
                background: #f7f4ee;
                color: #1a1915;
                transition: opacity 300ms cubic-bezier(0.25, 0.46, 0.45, 0.94);
            }
            #origa-boot-splash__wordmark {
                font-family: serif;
                font-weight: 300;
                font-size: clamp(2.5rem, 12vw, 4rem);
                letter-spacing: 0.04em;
                line-height: 1;
                margin: 0;
            }
            #origa-boot-splash__indicator {
                width: 56px;
                height: 2px;
                background: #d4cfc3;
                position: relative;
                overflow: hidden;
            }
            #origa-boot-splash__indicator::after {
                content: "";
                position: absolute;
                top: 0;
                left: 0;
                width: 40%;
                height: 100%;
                background: #1a1915;
                animation: origa-boot-sweep 1.1s cubic-bezier(0.25, 0.46, 0.45, 0.94) infinite;
            }
            @keyframes origa-boot-sweep {
                0% { transform: translateX(-100%); }
                100% { transform: translateX(250%); }
            }
            #origa-boot-splash.origa-boot-splash--hidden {
                opacity: 0;
                pointer-events: none;
            }
            @media (prefers-reduced-motion: reduce) {
                #origa-boot-splash__indicator::after { animation: none; }
                #origa-boot-splash { transition: none; }
            }
        </style>

        <link rel="icon" type="image/png" href="public/logo.png" />
        <link
            data-trunk
            rel="tailwind-css"
            href="input.css"
            data-integrity="none"
        />
        <link data-trunk rel="copy-dir" href="public" />
        <!-- Fonts are copied into public/fonts/ by build.rs (from the canonical
             cdn/fonts/) so the existing public/ copy-dir above serves them at
             /fonts/ on the local origin. trunk does not accept assets outside
             the index.html directory (trunk-rs/trunk#1045), so we stage them
             inside public/ first. See ADR-028. -->
        <link
            data-trunk
            rel="rust"
            data-target-name="origa_ui_bin"
            data-wasm-opt="z"
            data-integrity="none"
            data-wasm-opt-params="--enable-bulk-memory --enable-nontrapping-float-to-int --enable-simd --enable-sign-ext"
        />
    </head>

    <body class="paper-texture">
        <div id="origa-boot-splash" aria-hidden="true">
            <p id="origa-boot-splash__wordmark">オリガ</p>
            <div id="origa-boot-splash__indicator"></div>
        </div>
    </body>
</html>
