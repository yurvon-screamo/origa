name: 'Setup Rust'
description: 'Setup Rust toolchain with cargo caching'

inputs:
  targets:
    description: 'Comma-separated list of targets (e.g. "x86_64-unknown-linux-gnu,wasm32-unknown-unknown")'
    required: false
    default: ''
  shared-key:
    description: 'Shared key for cache sharing between jobs'
    required: false
    default: ''

outputs:
  cache-hit:
    description: 'Whether cache was hit'
    value: ${{ steps.rust-cache.outputs.cache-hit }}

runs:
  using: 'composite'
  steps:
    - name: Setup Rust toolchain
      uses: dtolnay/rust-toolchain@stable
      with:
        targets: ${{ inputs.targets }}

    - name: Setup cargo cache
      uses: Swatinem/rust-cache@v2
      id: rust-cache
      with:
        cache-all-crates: true
        shared-key: ${{ inputs.shared-key }}
        save-always: true
