name: "Download CDN Data"
description: "Download and cache CDN test data with integrity verification"

inputs:
  cache-key:
    description: "Cache key prefix"
    required: false
    default: "cdn-data-v6"
  cdn-base-url:
    description: "CDN base URL for downloading files"
    required: true

runs:
  using: "composite"
  steps:
    - name: Cache CDN data
      uses: actions/cache@v4
      id: cache-cdn
      with:
        path: cdn
        key: ${{ inputs.cache-key }}

    - name: Verify cached data
      id: verify
      shell: bash
      run: |
        if [ "${{ steps.cache-cdn.outputs.cache-hit }}" != "true" ]; then
          echo "cache_miss=true" >> $GITHUB_OUTPUT
          exit 0
        fi
        echo "Cache hit — verifying integrity..."
        ERRORS=0
        declare -A MIN_SIZES
        MIN_SIZES["well_known_set/well_known_sets_meta.json"]=100000
        MIN_SIZES["well_known_set/well_known_types_meta.json"]=100
        MIN_SIZES["dictionaries/metadata.json"]=100
        MIN_SIZES["grammar/grammar.json"]=1000
        MIN_SIZES["manifest.json"]=100
        MIN_SIZES["dictionaries/JmdictFurigana.txt"]=1000
        MIN_SIZES["phrases/phrase_index.json"]=100
        MIN_SIZES["pitch/index.json"]=100

        for f in "${!MIN_SIZES[@]}"; do
          min_size=${MIN_SIZES[$f]}
          if [ ! -s "cdn/$f" ]; then
            echo "MISSING: cdn/$f"
            ERRORS=$((ERRORS + 1))
            continue
          fi
          actual_size=$(wc -c < "cdn/$f")
          if [ "$actual_size" -lt "$min_size" ]; then
            echo "CORRUPTED: cdn/$f ($actual_size < $min_size bytes)"
            ERRORS=$((ERRORS + 1))
          fi
        done

        if [ "$ERRORS" -gt 0 ]; then
          echo "Cache corrupted — will re-download"
          rm -rf cdn
          echo "cache_miss=true" >> $GITHUB_OUTPUT
        else
          echo "Cache verified OK"
          echo "cache_miss=false" >> $GITHUB_OUTPUT
        fi

    - name: Download CDN data
      if: steps.verify.outputs.cache_miss == 'true'
      shell: bash
      env:
        CDN_BASE: ${{ inputs.cdn-base-url }}
      run: |
        set -e
        mkdir -p cdn/dictionaries cdn/dictionary cdn/grammar
        mkdir -p cdn/well_known_set cdn/phrases cdn/pitch cdn/ndlocr

        dl() {
          local file="$1"
          local url="$2"
          local retries=3
          for i in $(seq 1 $retries); do
            if curl -sSf --connect-timeout 10 --max-time 120 -o "$file" "$url" && [ -s "$file" ]; then
              return 0
            fi
            echo "Retry $i/$retries for $(basename $file)"
            rm -f "$file"
            sleep 2
          done
          echo "FAILED: $file after $retries attempts"
          return 1
        }

        # Lindera tokenizer data
        for f in char_def.bin matrix.mtx dict.da dict.vals unk.bin dict.wordsidx dict.words metadata.json; do
          dl "cdn/dictionaries/$f" "${CDN_BASE}/dictionaries/$f"
        done

        # Vocabulary chunks + kanji + radicals
        for f in chunk_01.json chunk_02.json chunk_03.json chunk_04.json chunk_05.json chunk_06.json chunk_07.json chunk_08.json chunk_09.json chunk_10.json chunk_11.json kanji.json radicals.json; do
          dl "cdn/dictionary/$f" "${CDN_BASE}/dictionary/$f"
        done

        # Grammar
        dl "cdn/grammar/grammar.json" "${CDN_BASE}/grammar/grammar.json"

        # Well-known sets
        dl "cdn/well_known_set/well_known_sets_meta.json" "${CDN_BASE}/well_known_set/well_known_sets_meta.json"
        dl "cdn/well_known_set/well_known_types_meta.json" "${CDN_BASE}/well_known_set/well_known_types_meta.json"
        for level in n5 n4 n3 n2 n1; do
          dl "cdn/well_known_set/jlpt_${level}.json" "${CDN_BASE}/well_known_set/jlpt_${level}.json"
        done

        # Phrase + pitch + manifest + furigana
        dl "cdn/phrases/phrase_index.json" "${CDN_BASE}/phrases/phrase_index.json"
        dl "cdn/pitch/index.json" "${CDN_BASE}/pitch/index.json"
        dl "cdn/manifest.json" "${CDN_BASE}/manifest.json"
        dl "cdn/dictionaries/JmdictFurigana.txt" "${CDN_BASE}/dictionaries/JmdictFurigana.txt"

        # NDLOCR model files
        for f in deim.onnx parseq-30.onnx parseq-50.onnx parseq-100.onnx vocab.txt; do
          dl "cdn/ndlocr/$f" "${CDN_BASE}/ndlocr/$f"
        done

        # Set files (migii, minna, duolingo, etc.) from manifest
        python3 -c "
        import json
        with open('cdn/well_known_set/well_known_sets_meta.json') as f:
            sets = json.load(f)
        for m in sets:
            sid = m['id']
            if sid.startswith('jlpt_'):
                print(f'well_known_set/{sid}.json')
            elif sid.startswith('migii_'):
                level = sid.split('_')[1]
                print(f'well_known_set/migii/{level}/{sid}.json')
            elif sid.startswith('minna_n5_'):
                print(f'well_known_set/minna_n5/{sid}.json')
            elif sid.startswith('minna_n4_'):
                print(f'well_known_set/minna_n4/{sid}.json')
            elif sid.startswith('duolingo_'):
                level = sid[10:].split('_')[0]
                print(f'well_known_set/duolingo/{level}/{sid}.json')
            else:
                print(f'well_known_set/{sid}.json')
        " | while read -r path; do
            mkdir -p "cdn/$(dirname "$path")"
            dl "cdn/$path" "${CDN_BASE}/$path" || true
        done
        echo "Set files download complete"

    - name: Final verification
      shell: bash
      run: |
        echo "Verifying CDN data..."
        ERRORS=0
        declare -A MIN_SIZES
        MIN_SIZES["well_known_set/well_known_sets_meta.json"]=100000
        MIN_SIZES["well_known_set/well_known_types_meta.json"]=100
        MIN_SIZES["dictionaries/metadata.json"]=100
        MIN_SIZES["grammar/grammar.json"]=1000
        MIN_SIZES["manifest.json"]=100
        MIN_SIZES["dictionaries/JmdictFurigana.txt"]=1000
        MIN_SIZES["phrases/phrase_index.json"]=100
        MIN_SIZES["pitch/index.json"]=100

        for f in "${!MIN_SIZES[@]}"; do
          min_size=${MIN_SIZES[$f]}
          if [ ! -s "cdn/$f" ]; then
            echo "ERROR: cdn/$f is missing or empty!"
            ERRORS=$((ERRORS + 1))
            continue
          fi
          actual_size=$(wc -c < "cdn/$f")
          if [ "$actual_size" -lt "$min_size" ]; then
            echo "ERROR: cdn/$f too small ($actual_size < $min_size) — corrupted!"
            ERRORS=$((ERRORS + 1))
          else
            echo "  OK: cdn/$f ($actual_size bytes)"
          fi
        done

        if [ "$ERRORS" -gt 0 ]; then
          echo "FATAL: $ERRORS critical files failed verification"
          exit 1
        fi
        echo "All critical CDN files verified."
