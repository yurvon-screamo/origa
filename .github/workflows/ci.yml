name: CI

on:
    pull_request:
        branches: [master]
    push:
        branches: [master]
        paths-ignore: ["docs/**", "*.md", "scripts/**", "cdn/**"]
    workflow_dispatch:

concurrency:
    group: ci-${{ github.ref }}
    cancel-in-progress: true

env:
    CARGO_TERM_COLOR: always

permissions:
    contents: read
    actions: write

jobs:
    version:
        name: Version
        if: github.event_name == 'pull_request'
        permissions:
            contents: read
        runs-on: ubuntu-latest
        outputs:
            version: ${{ steps.version.outputs.version }}
            version_base: ${{ steps.version.outputs.version_base }}
            version_type: ${{ steps.version.outputs.version_type }}
            commit_sha: ${{ steps.version.outputs.commit_sha }}
            commit_short: ${{ steps.version.outputs.commit_short }}
            build_date: ${{ steps.version.outputs.build_date }}
        steps:
            - uses: actions/checkout@v4
              with:
                  fetch-depth: 0
                  filter: blob:none

            - name: Calculate version
              id: version
              uses: ./.github/actions/version

    lint:
        name: Lint
        permissions:
            contents: read
        runs-on: ubuntu-24.04
        env:
            ORIGA_CDN_BASE_URL: "https://${{ vars.ORIGA_CDN_URI_PREFIX }}.${{ vars.ORIGA_BASE_URI }}"
            ORIGA_LANDING_BASE_URL: "https://${{ vars.ORIGA_BASE_URI }}"
            ORIGA_APP_BASE_URL: "https://${{ vars.ORIGA_APP_URI_PREFIX }}.${{ vars.ORIGA_BASE_URI }}"
            TRAILBASE_URL: "https://${{ vars.ORIGA_APP_URI_PREFIX }}.${{ vars.ORIGA_BASE_URI }}"
        steps:
            - name: Checkout repository
              uses: actions/checkout@v4

            - name: Cache APT packages
              uses: awalsh128/cache-apt-pkgs-action@v1.5.0
              with:
                  packages:
                      libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf
                      protobuf-compiler libspeechd-dev
                  version: 1.0

            - name: Setup Rust
              uses: ./.github/actions/setup-rust
              with:
                  targets: wasm32-unknown-unknown
                  shared-key: origa-ci-v2
                  save-if: false

            - name: Setup Node.js for landing CSS
              uses: actions/setup-node@v6
              with:
                  node-version: "20"

            - name: Build landing CSS
              working-directory: origa_landing
              run: npm ci && npm run build:css

            - name: Check formatting
              run: cargo fmt --check --all

            - name: Run clippy
              run: cargo clippy --workspace --all-targets -- -D warnings

    cdn-download:
        name: Download CDN
        permissions:
            contents: read
        runs-on: ubuntu-24.04
        steps:
            - name: Checkout repository
              uses: actions/checkout@v4

            - name: Download CDN data
              uses: ./.github/actions/download-cdn
              with:
                  cache-key: cdn-data-v11-${{ hashFiles('end2end/cdn-manifest.txt') }}
                  cdn-base-url: "https://${{ vars.ORIGA_CDN_URI_PREFIX }}.${{ vars.ORIGA_BASE_URI }}"

            - name: Upload CDN artifact
              uses: actions/upload-artifact@v4
              with:
                  name: cdn-data
                  path: cdn/
                  retention-days: 1

    test:
        name: Test
        permissions:
            contents: read
        needs: cdn-download
        runs-on: ubuntu-24.04
        env:
            ORIGA_CDN_BASE_URL: "https://${{ vars.ORIGA_CDN_URI_PREFIX }}.${{ vars.ORIGA_BASE_URI }}"
            ORIGA_LANDING_BASE_URL: "https://${{ vars.ORIGA_BASE_URI }}"
            ORIGA_APP_BASE_URL: "https://${{ vars.ORIGA_APP_URI_PREFIX }}.${{ vars.ORIGA_BASE_URI }}"
            TRAILBASE_URL: "https://${{ vars.ORIGA_APP_URI_PREFIX }}.${{ vars.ORIGA_BASE_URI }}"
        steps:
            - name: Checkout repository
              uses: actions/checkout@v4

            - name: Cache APT packages
              uses: awalsh128/cache-apt-pkgs-action@v1.5.0
              with:
                  packages:
                      libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf
                      protobuf-compiler libspeechd-dev
                  version: 1.0

            - name: Setup Rust
              uses: ./.github/actions/setup-rust
              with:
                  targets: wasm32-unknown-unknown
                  shared-key: origa-ci-v2
                  save-if: false

            - name: Cache UniDic dictionary
              uses: actions/cache@v4
              with:
                  path: origa_ui/public/dictionaries/unidic
                  key: unidic-dict-v1-${{ hashFiles('origa_ui/build.rs') }}
                  restore-keys: unidic-dict-v1-

            - name: Download CDN artifact
              uses: actions/download-artifact@v8
              with:
                  name: cdn-data
                  path: cdn/

            - name: Setup Node.js for landing CSS
              uses: actions/setup-node@v6
              with:
                  node-version: "20"

            - name: Build landing CSS
              working-directory: origa_landing
              run: npm ci && npm run build:css

            - name: Run tests
              run: cargo test --workspace

    e2e-build:
        name: E2E Build
        permissions:
            contents: read
        needs: cdn-download
        runs-on: ubuntu-24.04
        env:
            ORIGA_CDN_BASE_URL: http://localhost:8080
            TRAILBASE_URL: http://localhost:4000
        steps:
            - name: Checkout repository
              uses: actions/checkout@v4

            - name: Cache APT packages
              uses: awalsh128/cache-apt-pkgs-action@v1.5.0
              with:
                  packages:
                      libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf
                      protobuf-compiler libspeechd-dev
                  version: 1.0

            - name: Setup Rust
              uses: ./.github/actions/setup-rust
              with:
                  targets: wasm32-unknown-unknown
                  shared-key: origa-ci-v2
                  save-if: false

            - name: Setup Frontend
              uses: ./.github/actions/setup-frontend
              with:
                  tools: trunk

            - name: Build landing CSS
              working-directory: origa_landing
              run: npm ci && npm run build:css

            - name: Download CDN artifact
              uses: actions/download-artifact@v8
              with:
                  name: cdn-data
                  path: cdn/

            - name: Build WASM
              run: cd origa_ui && trunk build --release
              env:
                  ORIGA_CDN_BASE_URL: http://localhost:8080
                  TRAILBASE_URL: http://localhost:4000

            - name: Upload WASM artifact
              uses: actions/upload-artifact@v4
              with:
                  name: wasm-dist
                  path: origa_ui/dist/
                  retention-days: 1

    e2e:
        name: E2E (${{ matrix.spec }})
        permissions:
            contents: read
        needs: e2e-build
        runs-on: ubuntu-24.04
        strategy:
            fail-fast: false
            matrix:
                spec:
                    - auth
                    - grammar
                    - home
                    - kanji
                    - lesson
                    - navigation
                    - onboarding
                    - phrase
                    - profile
                    - session
                    - sets
                    - words
        env:
            ORIGA_CDN_BASE_URL: http://localhost:8080
            TRAILBASE_URL: http://localhost:4000
            ORIGA_ADMIN_EMAIL: admin@localhost
            ORIGA_ADMIN_PASSWORD: secret
            CI: "true"
        steps:
            - name: Checkout repository
              uses: actions/checkout@v4

            - name: Download WASM artifact
              uses: actions/download-artifact@v8
              with:
                  name: wasm-dist
                  path: origa_ui/dist/

            - name: Download CDN artifact
              uses: actions/download-artifact@v8
              with:
                  name: cdn-data
                  path: cdn/

            - name: Cache TrailBase CLI
              id: cache-trailbase
              uses: actions/cache@v4
              with:
                  path: ~/.local/bin/trail
                  key: trailbase-v0.28.3-verified  # Keep in sync with origa_ui/Dockerfile FROM

            - name: Add TrailBase to PATH
              run: echo "$HOME/.local/bin" >> $GITHUB_PATH

            - name: Validate TrailBase CLI
              id: validate-trailbase
              run: |
                  if command -v trail &> /dev/null && trail --version &> /dev/null; then
                    echo "valid=true" >> $GITHUB_OUTPUT
                  else
                    echo "valid=false" >> $GITHUB_OUTPUT
                  fi

            - name: Install TrailBase CLI
              if: steps.cache-trailbase.outputs.cache-hit != 'true' || steps.validate-trailbase.outputs.valid != 'true'
              run: |
                  for i in 1 2 3 4 5; do
                    tmp=$(mktemp) && curl -sSfL --retry 3 --retry-delay 10 -o "$tmp" \
                      https://trailbase.io/install.sh && bash "$tmp" && break
                    echo "Attempt $i failed, retrying in 15s..."
                    rm -f "$tmp"
                    sleep 15
                  done

            - name: Verify TrailBase
              run: trail --version

            - name: Install Node.js dependencies
              working-directory: end2end
              run: npm ci

            - name: Cache Playwright browsers
              id: playwright-cache
              uses: actions/cache@v4
              with:
                  path: ~/.cache/ms-playwright
                  key: playwright-chromium-v1-${{ hashFiles('end2end/package-lock.json') }}

            - name: Install Playwright browsers
              if: steps.playwright-cache.outputs.cache-hit != 'true'
              run: npx playwright install --with-deps chromium
              working-directory: end2end

            - name: Run E2E test (${{ matrix.spec }})
              working-directory: end2end
              run: npx playwright test tests/${{ matrix.spec }}.spec.ts --project=chromium

            - name: Upload blob report
              if: always()
              uses: actions/upload-artifact@v4
              with:
                  name: blob-report-${{ matrix.spec }}
                  path: end2end/blob-report/
                  retention-days: 7

    e2e-report:
        name: E2E Report
        permissions:
            contents: read
        needs: e2e
        if: always() && needs.e2e.result != 'cancelled'
        runs-on: ubuntu-24.04
        steps:
            - name: Checkout repository
              uses: actions/checkout@v4

            - name: Install Node.js dependencies
              working-directory: end2end
              run: npm ci

            - name: Cache Playwright browsers
              id: playwright-cache
              uses: actions/cache@v4
              with:
                  path: ~/.cache/ms-playwright
                  key: playwright-chromium-v1-${{ hashFiles('end2end/package-lock.json') }}

            - name: Install Playwright browsers
              if: steps.playwright-cache.outputs.cache-hit != 'true'
              run: npx playwright install --with-deps chromium
              working-directory: end2end

            - name: Download all blob reports
              uses: actions/download-artifact@v8
              with:
                  pattern: blob-report-*
                  path: end2end/all-blob-reports/

            - name: Flatten blob reports
              working-directory: end2end/all-blob-reports
              run: |
                  count=$(find . -mindepth 2 -type f | wc -l)
                  if [ "$count" -eq 0 ]; then
                    echo "No blob reports found - skipping merge"
                    exit 0
                  fi
                  find . -mindepth 2 -type f | while read -r f; do
                      dir_name=$(basename "$(dirname "$f")")
                      mv "$f" "./${dir_name}_$(basename "$f")"
                  done

            - name: Merge blob reports
              working-directory: end2end
              run: npx playwright merge-reports --reporter=html ./all-blob-reports

            - name: Upload merged Playwright report
              if: always()
              uses: actions/upload-artifact@v4
              with:
                  name: playwright-report-merged
                  path: end2end/playwright-report/
                  retention-days: 30

    build-tauri:
        name: Build Tauri
        needs: [version, e2e-build]
        if: github.event_name == 'pull_request'
        uses: ./.github/workflows/_build-tauri.yml
        with:
            version: ${{ needs.version.outputs.version }}
            version_base: ${{ needs.version.outputs.version_base }}
            version_type: ${{ needs.version.outputs.version_type }}
            commit_sha: ${{ needs.version.outputs.commit_sha }}
            build_date: ${{ needs.version.outputs.build_date }}
            wasm_artifact_name: wasm-dist
            platforms: "windows,linux,macos,android"
            skip_android: ${{ github.actor == 'dependabot[bot]' }}
        secrets:
            tauri-signing-private-key: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY || vars.TAURI_CI_DUMMY_PRIVATE_KEY }}
            tauri-signing-private-key-password: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
            android-keystore-base64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
            android-keystore-password: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
            android-key-password: ${{ secrets.ANDROID_KEY_PASSWORD }}
            android-key-alias: ${{ secrets.ANDROID_KEY_ALIAS }}

    docker-build-landing:
        name: Docker Build (landing)
        permissions:
            contents: read
        if: github.event_name == 'pull_request'
        runs-on: ubuntu-latest
        steps:
            - name: Checkout repository
              uses: actions/checkout@v4

            - name: Set up Docker Buildx
              uses: docker/setup-buildx-action@v3

            - name: Build landing image
              uses: docker/build-push-action@v6
              with:
                  context: .
                  file: ./origa_landing/Dockerfile
                  push: false
                  cache-from: type=registry,ref=ghcr.io/yurvon-screamo/origa:landing-buildcache
                  build-args: |
                      ORIGA_LANDING_BASE_URL=https://${{ vars.ORIGA_BASE_URI }}
                      ORIGA_APP_BASE_URL=https://${{ vars.ORIGA_APP_URI_PREFIX }}.${{ vars.ORIGA_BASE_URI }}

    docker-build-ui:
        name: Docker Build (ui)
        permissions:
            contents: read
        if: github.event_name == 'pull_request'
        runs-on: ubuntu-latest
        steps:
            - name: Checkout repository
              uses: actions/checkout@v4

            - name: Set up Docker Buildx
              uses: docker/setup-buildx-action@v3

            - name: Build UI image
              uses: docker/build-push-action@v6
              with:
                  context: .
                  file: ./origa_ui/Dockerfile
                  push: false
                  cache-from: type=registry,ref=ghcr.io/yurvon-screamo/origa:ui-buildcache
                  build-args: |
                      ORIGA_CDN_BASE_URL=https://${{ vars.ORIGA_CDN_URI_PREFIX }}.${{ vars.ORIGA_BASE_URI }}
                      ORIGA_CDN_REGION=${{ vars.ORIGA_CDN_REGION }}
                      TRAILBASE_URL=https://${{ vars.ORIGA_APP_URI_PREFIX }}.${{ vars.ORIGA_BASE_URI }}

    check:
        name: CI Gate
        permissions:
            contents: read
        needs: [lint, test, e2e, docker-build-landing, docker-build-ui, build-tauri]
        if: always()
        runs-on: ubuntu-latest
        steps:
            - name: Verify all jobs passed
              run: |
                  check() {
                    local job="$1" result="$2"
                    shift 2
                    for allowed in "$@"; do
                      [[ "$result" == "$allowed" ]] && return 0
                    done
                    echo "::error::$job failed with result: $result"
                    return 1
                  }

                  check "lint" "${{ needs.lint.result }}" "success"
                  check "test" "${{ needs.test.result }}" "success"
                  check "e2e" "${{ needs.e2e.result }}" "success"
                  check "docker-build-landing" "${{ needs.docker-build-landing.result }}" "success" "skipped"
                  check "docker-build-ui" "${{ needs.docker-build-ui.result }}" "success" "skipped"
                  check "build-tauri" "${{ needs.build-tauri.result }}" "success" "skipped"

            - run: echo "All checks passed"
