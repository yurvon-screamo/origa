name: CI

on:
    pull_request:
        branches: [master]
    push:
        branches: [master]
        paths-ignore: ['docs/**', '*.md', 'scripts/**', 'cdn/**']
    workflow_dispatch:

concurrency:
    group: ci-${{ github.ref }}
    cancel-in-progress: true

env:
    CARGO_TERM_COLOR: always

jobs:
    lint:
        name: Lint
        runs-on: ubuntu-24.04
        env:
            ORIGA_CDN_BASE_URL: ${{ vars.ORIGA_CDN_BASE_URL }}
        steps:
            - name: Checkout repository
              uses: actions/checkout@v4

            - name: Cache APT packages
              uses: awalsh128/cache-apt-pkgs-action@latest
              with:
                  packages: libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf
                      protobuf-compiler libspeechd-dev
                  version: 1.0

            - name: Setup Rust
              uses: ./.github/actions/setup-rust
              with:
                  targets: wasm32-unknown-unknown
                  shared-key: origa-ci

            - name: Check formatting
              run: cargo fmt --check --all

            - name: Run clippy
              run: cargo clippy --workspace --all-targets -- -D warnings

    test:
        name: Test
        runs-on: ubuntu-24.04
        env:
            ORIGA_CDN_BASE_URL: ${{ vars.ORIGA_CDN_BASE_URL }}
        steps:
            - name: Checkout repository
              uses: actions/checkout@v4

            - name: Cache APT packages
              uses: awalsh128/cache-apt-pkgs-action@latest
              with:
                  packages: libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf
                      protobuf-compiler libspeechd-dev
                  version: 1.0

            - name: Setup Rust
              uses: ./.github/actions/setup-rust
              with:
                  targets: wasm32-unknown-unknown
                  shared-key: origa-ci

            - name: Cache UniDic dictionary
              uses: actions/cache@v4
              with:
                  path: origa_ui/public/dictionaries/unidic
                  key: unidic-dict-v1-${{ hashFiles('origa_ui/build.rs') }}
                  restore-keys: unidic-dict-v1-

            - name: Cache CDN data
              uses: actions/cache@v4
              id: cache-cdn-test
              with:
                  path: cdn
                  key: cdn-test-data-v1

            - name: Download test CDN data
              if: steps.cache-cdn-test.outputs.cache-hit != 'true'
              env:
                  CDN_BASE: ${{ vars.ORIGA_CDN_BASE_URL }}
              run: |
                  mkdir -p cdn/dictionaries cdn/dictionary cdn/grammar
                  
                  # Lindera tokenizer data
                  for f in char_def.bin matrix.mtx dict.da dict.vals unk.bin dict.wordsidx dict.words metadata.json; do
                    curl -sSf -o "cdn/dictionaries/$f" "${CDN_BASE}/dictionaries/$f" || echo "Warning: failed to download $f"
                  done
                  
                  # Vocabulary chunks + kanji + radicals
                  for f in chunk_01.json chunk_02.json chunk_03.json chunk_04.json chunk_05.json chunk_06.json chunk_07.json chunk_08.json chunk_09.json chunk_10.json chunk_11.json kanji.json radicals.json; do
                    curl -sSf -o "cdn/dictionary/$f" "${CDN_BASE}/dictionary/$f" || echo "Warning: failed to download $f"
                  done
                  
                  # Grammar
                  curl -sSf -o "cdn/grammar/grammar.json" "${CDN_BASE}/grammar/grammar.json" || echo "Warning: failed to download grammar.json"

                  # Well-known sets meta + JLPT sets
                  mkdir -p cdn/well_known_set
                  curl -sSf -o "cdn/well_known_set/well_known_sets_meta.json" "${CDN_BASE}/well_known_set/well_known_sets_meta.json" || echo "Warning: failed"
                  curl -sSf -o "cdn/well_known_set/well_known_types_meta.json" "${CDN_BASE}/well_known_set/well_known_types_meta.json" || echo "Warning: failed"
                  for level in n5 n4 n3 n2 n1; do
                    curl -sSf -o "cdn/well_known_set/jlpt_${level}.json" "${CDN_BASE}/well_known_set/jlpt_${level}.json" || echo "Warning: failed to download jlpt_${level}.json"
                  done

                  # Phrase index
                  mkdir -p cdn/phrases
                  curl -sSf -o "cdn/phrases/phrase_index.json" "${CDN_BASE}/phrases/phrase_index.json" || echo "Warning: failed"

                  # Furigana dictionary
                  curl -sSf -o "cdn/dictionaries/JmdictFurigana.txt" "${CDN_BASE}/dictionaries/JmdictFurigana.txt" || echo "Warning: failed"

                  echo "Downloaded CDN test data:"
                  find cdn -type f | head -30

            - name: Run tests
              run: cargo test --workspace

    e2e-build:
        name: E2E Build
        runs-on: ubuntu-24.04
        env:
            ORIGA_CDN_BASE_URL: http://localhost:8080
            TRAILBASE_URL: http://localhost:4000
        steps:
            - name: Checkout repository
              uses: actions/checkout@v4

            - name: Cache APT packages
              uses: awalsh128/cache-apt-pkgs-action@latest
              with:
                  packages: libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf
                      protobuf-compiler libspeechd-dev
                  version: 1.0

            - name: Setup Rust
              uses: ./.github/actions/setup-rust
              with:
                  targets: wasm32-unknown-unknown
                  shared-key: origa-ci

            - name: Setup Frontend
              uses: ./.github/actions/setup-frontend
              with:
                  tools: trunk

            - name: Cache UniDic dictionary
              uses: actions/cache@v4
              with:
                  path: origa_ui/public/dictionaries/unidic
                  key: unidic-dict-v1-${{ hashFiles('origa_ui/build.rs') }}
                  restore-keys: unidic-dict-v1-

            - name: Cache CDN data
              uses: actions/cache@v4
              id: cache-cdn-build
              with:
                  path: cdn
                  key: cdn-e2e-data-v1

            - name: Download CDN data
              if: steps.cache-cdn-build.outputs.cache-hit != 'true'
              env:
                  CDN_BASE: ${{ vars.ORIGA_CDN_BASE_URL }}
              run: |
                  mkdir -p cdn/dictionaries cdn/dictionary cdn/grammar
                  mkdir -p cdn/well_known_set cdn/phrases cdn/pitch
                  for f in char_def.bin matrix.mtx dict.da dict.vals unk.bin dict.wordsidx dict.words metadata.json; do
                    curl -sSf -o "cdn/dictionaries/$f" "${CDN_BASE}/dictionaries/$f" || echo "Warning: failed to download $f"
                  done
                  for f in chunk_01.json chunk_02.json chunk_03.json chunk_04.json chunk_05.json chunk_06.json chunk_07.json chunk_08.json chunk_09.json chunk_10.json chunk_11.json kanji.json radicals.json; do
                    curl -sSf -o "cdn/dictionary/$f" "${CDN_BASE}/dictionary/$f" || echo "Warning: failed to download $f"
                  done
                  curl -sSf -o "cdn/grammar/grammar.json" "${CDN_BASE}/grammar/grammar.json" || echo "Warning: failed"
                  curl -sSf -o "cdn/well_known_set/well_known_sets_meta.json" "${CDN_BASE}/well_known_set/well_known_sets_meta.json" || echo "Warning: failed"
                  curl -sSf -o "cdn/well_known_set/well_known_types_meta.json" "${CDN_BASE}/well_known_set/well_known_types_meta.json" || echo "Warning: failed"
                  for level in n5 n4 n3 n2 n1; do
                    curl -sSf -o "cdn/well_known_set/jlpt_${level}.json" "${CDN_BASE}/well_known_set/jlpt_${level}.json" || echo "Warning: failed"
                  done
                  curl -sSf -o "cdn/phrases/phrase_index.json" "${CDN_BASE}/phrases/phrase_index.json" || echo "Warning: failed"
                  curl -sSf -o "cdn/pitch/index.json" "${CDN_BASE}/pitch/index.json" || echo "Warning: failed"
                  curl -sSf -o "cdn/manifest.json" "${CDN_BASE}/manifest.json" || echo "Warning: failed"
                  curl -sSf -o "cdn/dictionaries/JmdictFurigana.txt" "${CDN_BASE}/dictionaries/JmdictFurigana.txt" || echo "Warning: failed"

            - name: Build WASM
              run: cd origa_ui && trunk build --release
              env:
                  ORIGA_CDN_BASE_URL: http://localhost:8080
                  TRAILBASE_URL: http://localhost:4000

            - name: Upload WASM artifact
              uses: actions/upload-artifact@v4
              with:
                  name: wasm-dist
                  path: origa_ui/dist/
                  retention-days: 1

    e2e:
        name: E2E (${{ matrix.spec }})
        needs: e2e-build
        runs-on: ubuntu-24.04
        strategy:
            fail-fast: false
            matrix:
                spec:
                    - auth
                    - grammar
                    - home
                    - kanji
                    - lesson
                    - navigation
                    - onboarding
                    - phrase
                    - profile
                    - session
                    - sets
                    - words
        env:
            ORIGA_CDN_BASE_URL: http://localhost:8080
            TRAILBASE_URL: http://localhost:4000
            ORIGA_ADMIN_EMAIL: admin@localhost
            ORIGA_ADMIN_PASSWORD: secret
            CI: "true"
        steps:
            - name: Checkout repository
              uses: actions/checkout@v4

            - name: Download WASM artifact
              uses: actions/download-artifact@v4
              with:
                  name: wasm-dist
                  path: origa_ui/dist/

            - name: Cache CDN data
              uses: actions/cache@v4
              id: cache-cdn-e2e
              with:
                  path: cdn
                  key: cdn-e2e-data-v1

            - name: Download CDN data
              if: steps.cache-cdn-e2e.outputs.cache-hit != 'true'
              env:
                  CDN_BASE: ${{ vars.ORIGA_CDN_BASE_URL }}
              run: |
                  mkdir -p cdn/dictionaries cdn/dictionary cdn/grammar
                  mkdir -p cdn/well_known_set cdn/phrases cdn/pitch
                  for f in char_def.bin matrix.mtx dict.da dict.vals unk.bin dict.wordsidx dict.words metadata.json; do
                    curl -sSf -o "cdn/dictionaries/$f" "${CDN_BASE}/dictionaries/$f" || echo "Warning: failed to download $f"
                  done
                  for f in chunk_01.json chunk_02.json chunk_03.json chunk_04.json chunk_05.json chunk_06.json chunk_07.json chunk_08.json chunk_09.json chunk_10.json chunk_11.json kanji.json radicals.json; do
                    curl -sSf -o "cdn/dictionary/$f" "${CDN_BASE}/dictionary/$f" || echo "Warning: failed to download $f"
                  done
                  curl -sSf -o "cdn/grammar/grammar.json" "${CDN_BASE}/grammar/grammar.json" || echo "Warning: failed"
                  curl -sSf -o "cdn/well_known_set/well_known_sets_meta.json" "${CDN_BASE}/well_known_set/well_known_sets_meta.json" || echo "Warning: failed"
                  curl -sSf -o "cdn/well_known_set/well_known_types_meta.json" "${CDN_BASE}/well_known_set/well_known_types_meta.json" || echo "Warning: failed"
                  for level in n5 n4 n3 n2 n1; do
                    curl -sSf -o "cdn/well_known_set/jlpt_${level}.json" "${CDN_BASE}/well_known_set/jlpt_${level}.json" || echo "Warning: failed"
                  done
                  curl -sSf -o "cdn/phrases/phrase_index.json" "${CDN_BASE}/phrases/phrase_index.json" || echo "Warning: failed"
                  curl -sSf -o "cdn/pitch/index.json" "${CDN_BASE}/pitch/index.json" || echo "Warning: failed"
                  curl -sSf -o "cdn/manifest.json" "${CDN_BASE}/manifest.json" || echo "Warning: failed"
                  curl -sSf -o "cdn/dictionaries/JmdictFurigana.txt" "${CDN_BASE}/dictionaries/JmdictFurigana.txt" || echo "Warning: failed"

            - name: Install TrailBase
              run: |
                  curl -sSfL https://trailbase.io/install.sh | bash
                  echo "$HOME/.local/bin" >> $GITHUB_PATH

            - name: Install Node.js dependencies
              working-directory: end2end
              run: npm ci

            - name: Install Playwright browsers
              run: npx playwright install --with-deps chromium
              working-directory: end2end

            - name: Run E2E test (${{ matrix.spec }})
              working-directory: end2end
              run: npx playwright test tests/${{ matrix.spec }}.spec.ts --project=chromium --reporter=line

            - name: Upload Playwright report
              if: failure()
              uses: actions/upload-artifact@v4
              with:
                  name: playwright-report-${{ matrix.spec }}
                  path: end2end/playwright-report/
                  retention-days: 7


    check:
        name: CI Gate
        needs: [lint, test, e2e]
        runs-on: ubuntu-latest
        steps:
            - run: echo "All checks passed"
