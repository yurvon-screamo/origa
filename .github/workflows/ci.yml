name: CI

on:
    pull_request:
        branches: [master]
    push:
        branches: [master]
        paths-ignore: ["docs/**", "*.md", "scripts/**", "cdn/**"]
    workflow_dispatch:

concurrency:
    group: ci-${{ github.ref }}
    cancel-in-progress: true

env:
    CARGO_TERM_COLOR: always

jobs:
    lint:
        name: Lint
        runs-on: ubuntu-24.04
        env:
            ORIGA_CDN_BASE_URL: "https://${{ vars.ORIGA_CDN_URI_PREFIX }}.${{ vars.ORIGA_BASE_URI }}"
            ORIGA_LANDING_BASE_URL: "https://${{ vars.ORIGA_BASE_URI }}"
            TRAILBASE_URL: "https://${{ vars.ORIGA_APP_URI_PREFIX }}.${{ vars.ORIGA_BASE_URI }}"
        steps:
            - name: Checkout repository
              uses: actions/checkout@v4

            - name: Cache APT packages
              uses: awalsh128/cache-apt-pkgs-action@latest
              with:
                  packages:
                      libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf
                      protobuf-compiler libspeechd-dev
                  version: 1.0

            - name: Setup Rust
              uses: ./.github/actions/setup-rust
              with:
                  targets: wasm32-unknown-unknown
                  shared-key: origa-ci

            - name: Setup Node.js for landing CSS
              uses: actions/setup-node@v4
              with:
                  node-version: "20"

            - name: Build landing CSS
              working-directory: origa_landing
              run: npm ci && npm run build:css

            - name: Check formatting
              run: cargo fmt --check --all

            - name: Run clippy
              run: cargo clippy --workspace --all-targets -- -D warnings

    cdn-download:
        name: Download CDN
        runs-on: ubuntu-24.04
        steps:
            - name: Checkout repository
              uses: actions/checkout@v4

            - name: Download CDN data
              uses: ./.github/actions/download-cdn
              with:
                  cache-key: cdn-data-v8-${{ hashFiles('end2end/cdn-manifest.txt') }}
                  cdn-base-url: "https://${{ vars.ORIGA_CDN_URI_PREFIX }}.${{ vars.ORIGA_BASE_URI }}"

            - name: Upload CDN artifact
              uses: actions/upload-artifact@v4
              with:
                  name: cdn-data
                  path: cdn/
                  retention-days: 1

    test:
        name: Test
        needs: cdn-download
        runs-on: ubuntu-24.04
        env:
            ORIGA_CDN_BASE_URL: "https://${{ vars.ORIGA_CDN_URI_PREFIX }}.${{ vars.ORIGA_BASE_URI }}"
            ORIGA_LANDING_BASE_URL: "https://${{ vars.ORIGA_BASE_URI }}"
            TRAILBASE_URL: "https://${{ vars.ORIGA_APP_URI_PREFIX }}.${{ vars.ORIGA_BASE_URI }}"
        steps:
            - name: Checkout repository
              uses: actions/checkout@v4

            - name: Cache APT packages
              uses: awalsh128/cache-apt-pkgs-action@latest
              with:
                  packages:
                      libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf
                      protobuf-compiler libspeechd-dev
                  version: 1.0

            - name: Setup Rust
              uses: ./.github/actions/setup-rust
              with:
                  targets: wasm32-unknown-unknown
                  shared-key: origa-ci

            - name: Cache UniDic dictionary
              uses: actions/cache@v4
              with:
                  path: origa_ui/public/dictionaries/unidic
                  key: unidic-dict-v1-${{ hashFiles('origa_ui/build.rs') }}
                  restore-keys: unidic-dict-v1-

            - name: Download CDN artifact
              uses: actions/download-artifact@v4
              with:
                  name: cdn-data
                  path: cdn/

            - name: Setup Node.js for landing CSS
              uses: actions/setup-node@v4
              with:
                  node-version: "20"

            - name: Build landing CSS
              working-directory: origa_landing
              run: npm ci && npm run build:css

            - name: Run tests
              run: cargo test --workspace

    e2e-build:
        name: E2E Build
        needs: cdn-download
        runs-on: ubuntu-24.04
        env:
            ORIGA_CDN_BASE_URL: http://localhost:8080
            TRAILBASE_URL: http://localhost:4000
        steps:
            - name: Checkout repository
              uses: actions/checkout@v4

            - name: Cache APT packages
              uses: awalsh128/cache-apt-pkgs-action@latest
              with:
                  packages:
                      libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf
                      protobuf-compiler libspeechd-dev
                  version: 1.0

            - name: Setup Rust
              uses: ./.github/actions/setup-rust
              with:
                  targets: wasm32-unknown-unknown
                  shared-key: origa-ci

            - name: Setup Frontend
              uses: ./.github/actions/setup-frontend
              with:
                  tools: trunk

            - name: Build landing CSS
              working-directory: origa_landing
              run: npm ci && npm run build:css

            - name: Download CDN artifact
              uses: actions/download-artifact@v4
              with:
                  name: cdn-data
                  path: cdn/

            - name: Build WASM
              run: cd origa_ui && trunk build --release
              env:
                  ORIGA_CDN_BASE_URL: http://localhost:8080
                  TRAILBASE_URL: http://localhost:4000

            - name: Upload WASM artifact
              uses: actions/upload-artifact@v4
              with:
                  name: wasm-dist
                  path: origa_ui/dist/
                  retention-days: 1

    e2e:
        name: E2E (${{ matrix.spec }})
        needs: e2e-build
        runs-on: ubuntu-24.04
        strategy:
            fail-fast: false
            matrix:
                spec:
                    - auth
                    - grammar
                    - home
                    - kanji
                    - lesson
                    - navigation
                    - onboarding
                    - phrase
                    - profile
                    - session
                    - sets
                    - words
        env:
            ORIGA_CDN_BASE_URL: http://localhost:8080
            TRAILBASE_URL: http://localhost:4000
            ORIGA_ADMIN_EMAIL: admin@localhost
            ORIGA_ADMIN_PASSWORD: secret
            CI: "true"
        steps:
            - name: Checkout repository
              uses: actions/checkout@v4

            - name: Download WASM artifact
              uses: actions/download-artifact@v4
              with:
                  name: wasm-dist
                  path: origa_ui/dist/

            - name: Download CDN artifact
              uses: actions/download-artifact@v4
              with:
                  name: cdn-data
                  path: cdn/

            - name: Install TrailBase
              run: |
                  for i in 1 2 3; do
                    tmp=$(mktemp) && curl -sSfL -o "$tmp" https://trailbase.io/install.sh && bash "$tmp" && break
                    echo "Attempt $i failed, retrying..."
                    sleep 5
                  done
                  echo "$HOME/.local/bin" >> $GITHUB_PATH
                  trailbase --version

            - name: Install Node.js dependencies
              working-directory: end2end
              run: npm ci

            - name: Install Playwright browsers
              run: npx playwright install --with-deps chromium
              working-directory: end2end

            - name: Run E2E test (${{ matrix.spec }})
              working-directory: end2end
              run: npx playwright test tests/${{ matrix.spec }}.spec.ts --project=chromium

            - name: Upload blob report
              if: always()
              uses: actions/upload-artifact@v4
              with:
                  name: blob-report-${{ matrix.spec }}
                  path: end2end/blob-report/
                  retention-days: 7

    e2e-report:
        name: E2E Report
        needs: e2e
        if: always() && needs.e2e.result != 'cancelled'
        runs-on: ubuntu-24.04
        steps:
            - name: Checkout repository
              uses: actions/checkout@v4

            - name: Install Node.js dependencies
              working-directory: end2end
              run: npm ci

            - name: Install Playwright browsers
              run: npx playwright install --with-deps chromium
              working-directory: end2end

            - name: Download all blob reports
              uses: actions/download-artifact@v4
              with:
                  pattern: blob-report-*
                  path: end2end/all-blob-reports/

            - name: Flatten blob reports
              working-directory: end2end/all-blob-reports
              run: |
                  count=$(find . -mindepth 2 -type f | wc -l)
                  if [ "$count" -eq 0 ]; then
                    echo "No blob reports found - skipping merge"
                    exit 0
                  fi
                  find . -mindepth 2 -type f | while read -r f; do
                      dir_name=$(basename "$(dirname "$f")")
                      mv "$f" "./${dir_name}_$(basename "$f")"
                  done

            - name: Merge blob reports
              working-directory: end2end
              run: npx playwright merge-reports --reporter=html ./all-blob-reports

            - name: Upload merged Playwright report
              if: always()
              uses: actions/upload-artifact@v4
              with:
                  name: playwright-report-merged
                  path: end2end/playwright-report/
                  retention-days: 30

    docker-build-landing:
        name: Docker Build (landing)
        if: github.event_name == 'pull_request'
        runs-on: ubuntu-latest
        steps:
            - name: Checkout repository
              uses: actions/checkout@v4

            - name: Set up Docker Buildx
              uses: docker/setup-buildx-action@v3

            - name: Build landing image
              uses: docker/build-push-action@v6
              with:
                  context: .
                  file: ./origa_landing/Dockerfile
                  push: false
                  cache-from: type=registry,ref=ghcr.io/yurvon-screamo/origa:landing-buildcache
                  build-args: |
                      ORIGA_LANDING_BASE_URL=https://${{ vars.ORIGA_BASE_URI }}

    docker-build-ui:
        name: Docker Build (ui)
        if: github.event_name == 'pull_request'
        runs-on: ubuntu-latest
        steps:
            - name: Checkout repository
              uses: actions/checkout@v4

            - name: Set up Docker Buildx
              uses: docker/setup-buildx-action@v3

            - name: Build UI image
              uses: docker/build-push-action@v6
              with:
                  context: .
                  file: ./origa_ui/Dockerfile
                  push: false
                  cache-from: type=registry,ref=ghcr.io/yurvon-screamo/origa:ui-buildcache
                  build-args: |
                      ORIGA_CDN_BASE_URL=https://${{ vars.ORIGA_CDN_URI_PREFIX }}.${{ vars.ORIGA_BASE_URI }}
                      ORIGA_CDN_REGION=${{ vars.ORIGA_CDN_REGION }}
                      TRAILBASE_URL=https://${{ vars.ORIGA_APP_URI_PREFIX }}.${{ vars.ORIGA_BASE_URI }}

    check:
        name: CI Gate
        needs: [lint, test, e2e, docker-build-landing, docker-build-ui]
        if: >
            always() &&
            needs.lint.result == 'success' &&
            needs.test.result == 'success' &&
            needs.e2e.result == 'success' &&
            (needs.docker-build-landing.result == 'success' || needs.docker-build-landing.result == 'skipped') &&
            (needs.docker-build-ui.result == 'success' || needs.docker-build-ui.result == 'skipped')
        runs-on: ubuntu-latest
        steps:
            - run: echo "All checks passed"
