name: Mobile Build

on:
  push:
    branches:
      - master
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: android
            os: ubuntu-22.04
          # TODO: Add iOS build support
          # - platform: ios
          # os: macos-15

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install system dependencies (Linux)
        if: matrix.os == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2
        with:
          cache-all-crates: true
          save-if: ${{ github.ref == 'refs/heads/master' }}

      - name: Install Rust targets (Android)
        if: matrix.platform == 'android'
        run: |
          rustup target add aarch64-linux-android
          rustup target add armv7-linux-androideabi
          rustup target add i686-linux-android
          rustup target add x86_64-linux-android

      - name: Install Rust targets (iOS)
        if: matrix.platform == 'ios'
        run: |
          rustup target add aarch64-apple-ios
          rustup target add aarch64-apple-ios-sim

      - name: Setup Java
        if: matrix.platform == 'android'
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Setup Android SDK
        if: matrix.platform == 'android'
        uses: android-actions/setup-android@v3

      - name: Setup Android NDK
        if: matrix.platform == 'android'
        uses: nttld/setup-ndk@v1
        id: setup-ndk
        with:
          ndk-version: r25b
          local-cache: true

      - name: Cache Gradle
        if: matrix.platform == 'android'
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Install cargo-binstall
        run: |
          curl -L --proto '=https' --tlsv1.2 -sSf https://raw.githubusercontent.com/cargo-bins/cargo-binstall/main/install-from-binstall-release.sh | bash
          cargo binstall trunk tauri-cli --no-confirm --force

      - name: Build frontend
        working-directory: origa_ui
        run: trunk build --release

      - name: Initialize Tauri Android
        if: matrix.platform == 'android'
        working-directory: tauri
        run: |
          echo "NDK_HOME=$NDK_HOME"
          echo "ANDROID_NDK_ROOT=$ANDROID_NDK_ROOT"
          ls -la $NDK_HOME || true
          cargo tauri android init --ci
        env:
          NDK_HOME: ${{ steps.setup-ndk.outputs.ndk-path }}
          ANDROID_NDK_ROOT: ${{ steps.setup-ndk.outputs.ndk-path }}

      - name: Build Tauri Android APK
        if: matrix.platform == 'android'
        working-directory: tauri
        run: |
          echo "=== Debug info ==="
          echo "NDK_HOME=$NDK_HOME"
          echo "ANDROID_NDK_ROOT=$ANDROID_NDK_ROOT"
          echo "=== NDK content ==="
          ls -la $NDK_HOME || echo "NDK_HOME not accessible"
          echo "=== Start build ==="
          cargo tauri android build 2>&1 || (echo "Build failed with exit code $?"; exit 1)
        env:
          NDK_HOME: ${{ steps.setup-ndk.outputs.ndk-path }}
          ANDROID_NDK_ROOT: ${{ steps.setup-ndk.outputs.ndk-path }}

      - name: Initialize Tauri iOS
        if: matrix.platform == 'ios'
        working-directory: tauri
        run: cargo tauri ios init --ci

      - name: Build Tauri iOS
        if: matrix.platform == 'ios'
        working-directory: tauri
        run: cargo tauri ios build --target aarch64 --ci

      - name: Upload Android APK
        if: matrix.platform == 'android'
        uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: tauri/gen/android/app/build/outputs/apk/**/*.apk

      - name: Upload iOS App
        if: matrix.platform == 'ios'
        uses: actions/upload-artifact@v4
        with:
          name: ios-app
          path: tauri/gen/apple/**/*.app

  release:
    name: Update Latest Release
    needs: [build]
    uses: ./.github/workflows/reusable-release.yml
    with:
      tag-name: latest
      release-name: Latest Build
      body: |
        Автоматическая сборка от ${{ github.sha }}

        ## Android
        - `*.apk` - Android App Package
    permissions:
      contents: write
