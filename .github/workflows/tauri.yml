name: Build Tauri App

on:
    pull_request:
        branches:
            - master
    workflow_run:
        workflows: ["CI"]
        types: [completed]
        branches: [master]
    push:
        tags:
            - "v*.*.*"
    workflow_dispatch:

concurrency:
    group: tauri-${{ github.ref }}
    cancel-in-progress: true

env:
    CARGO_TERM_COLOR: always

permissions:
    contents: read

jobs:
    version:
        permissions:
            contents: read
        runs-on: ubuntu-latest
        outputs:
            version: ${{ steps.version.outputs.version }}
            version_base: ${{ steps.version.outputs.version_base }}
            version_type: ${{ steps.version.outputs.version_type }}
            commit_sha: ${{ steps.version.outputs.commit_sha }}
            commit_short: ${{ steps.version.outputs.commit_short }}
            build_date: ${{ steps.version.outputs.build_date }}
        steps:
            - uses: actions/checkout@v4
              with:
                  fetch-depth: 0
                  filter: blob:none

            - name: Calculate version
              id: version
              uses: ./.github/actions/version

    build-windows:
        name: Build Windows
        needs: [version]
        if: >
            github.event_name == 'pull_request' ||
            github.event_name == 'push' ||
            github.event_name == 'workflow_dispatch' ||
            (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success')
        runs-on: ubuntu-latest
        container:
            image: ghcr.io/rust-cross/cargo-zigbuild
        permissions:
            contents: write
        outputs:
            signature: ${{ steps.signature.outputs.signature }}
        env:
            ORIGA_VERSION: ${{ needs.version.outputs.version }}
            ORIGA_COMMIT: ${{ needs.version.outputs.commit_sha }}
            ORIGA_BUILD_DATE: ${{ needs.version.outputs.build_date }}
            TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY || vars.TAURI_CI_DUMMY_PRIVATE_KEY }}
            TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
            XWIN_CACHE_DIR: ${{ github.workspace }}/.xwin-cache

        steps:
            - name: Checkout repository
              uses: actions/checkout@v4

            - name: Setup cargo cache
              uses: Swatinem/rust-cache@v2
              with:
                  cache-all-crates: true
                  cache-targets: false
                  shared-key: origa-cross-build
                  save-if: ${{ github.ref == 'refs/heads/master' }}

            - name: Cache UniDic dictionary
              uses: actions/cache@v4
              with:
                  path: origa_ui/public/dictionaries/unidic
                  key: unidic-dict-v1-${{ hashFiles('origa_ui/build.rs') }}
                  restore-keys: unidic-dict-v1-

            - name: Update version in config files
              uses: ./.github/actions/update-version
              with:
                  version: ${{ needs.version.outputs.version_base }}

            - name: Install build dependencies
              run: apt-get update && apt-get install -y nsis clang lld llvm protobuf-compiler

            - name: Setup Rust targets
              run: rustup target add x86_64-pc-windows-msvc wasm32-unknown-unknown

            - name: Install cargo-binstall
              run: |
                  tmp=$(mktemp) && curl -L --proto '=https' --tlsv1.2 -sSf -o "$tmp" https://raw.githubusercontent.com/cargo-bins/cargo-binstall/main/install-from-binstall-release.sh && bash "$tmp"
                  cargo binstall trunk tauri-cli cargo-xwin --no-confirm --force

            - name: Add cargo bin to PATH
              run: echo "$HOME/.cargo/bin" >> $GITHUB_PATH

            - name: Build frontend
              working-directory: origa_ui
              run: trunk build --release
              env:
                  TRAILBASE_URL: ${{ vars.TRAILBASE_URL }}
                  ORIGA_CDN_BASE_URL: ${{ vars.ORIGA_CDN_BASE_URL }}
                  ORIGA_CDN_REGION: ${{ vars.ORIGA_CDN_REGION }}

            - name: Cache cargo-xwin MSVC CRT
              uses: actions/cache@v4
              with:
                  path: ${{ github.workspace }}/.xwin-cache
                  key: xwin-${{ runner.os }}-x86_64-pc-windows-msvc-v17
                  restore-keys: |
                      xwin-${{ runner.os }}-

            - name: Build Tauri app for Windows
              working-directory: tauri
              run: cargo tauri build --runner cargo-xwin --target x86_64-pc-windows-msvc
              env:
                  TAURI_BUNDLE_NSIS: "true"

            - name: Rename artifacts for latest release
              if: needs.version.outputs.version_type != 'stable'
              working-directory: target/x86_64-pc-windows-msvc/release/bundle
              run: |
                  # Rename NSIS
                  for f in nsis/*.exe; do mv "$f" "nsis/origa_latest_x64-setup.exe"; done
                  for f in nsis/*.sig; do mv "$f" "nsis/origa_latest_x64-setup.exe.sig"; done

            - name: Extract signature
              id: signature
              shell: bash
              run: |
                  SIG_FILE=$(ls target/x86_64-pc-windows-msvc/release/bundle/nsis/*.sig 2>/dev/null | head -1 || true)
                  if [ -n "$SIG_FILE" ] && [ -f "$SIG_FILE" ]; then
                    SIG_CONTENT=$(cat "$SIG_FILE")
                    echo "signature=${SIG_CONTENT}" >> $GITHUB_OUTPUT
                  else
                    echo "signature=" >> $GITHUB_OUTPUT
                  fi

            - name: Upload Windows artifacts
              uses: actions/upload-artifact@v4
              with:
                  name: windows-build
                  path: |
                      **/bundle/nsis/*.exe
                      **/bundle/nsis/*.sig
                  retention-days: 7

    build-linux:
        name: Build Linux
        needs: [version]
        if: >
            github.event_name == 'pull_request' ||
            github.event_name == 'push' ||
            github.event_name == 'workflow_dispatch' ||
            (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success')
        runs-on: ubuntu-24.04
        permissions:
            contents: write
        outputs:
            signature: ${{ steps.signature.outputs.signature }}
        env:
            ORIGA_VERSION: ${{ needs.version.outputs.version }}
            ORIGA_COMMIT: ${{ needs.version.outputs.commit_sha }}
            ORIGA_BUILD_DATE: ${{ needs.version.outputs.build_date }}
            TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY || vars.TAURI_CI_DUMMY_PRIVATE_KEY }}
            TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}

        steps:
            - name: Checkout repository
              uses: actions/checkout@v4

            - name: Update version in config files
              uses: ./.github/actions/update-version
              with:
                  version: ${{ needs.version.outputs.version_base }}

            - name: Cache APT packages
              uses: awalsh128/cache-apt-pkgs-action@latest
              with:
                  packages:
                      libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf
                      protobuf-compiler libspeechd-dev
                  version: 1.0

            - name: Install mold linker
              uses: rui314/setup-mold@v1

            - name: Setup Rust with caching
              uses: ./.github/actions/setup-rust
              with:
                  targets: x86_64-unknown-linux-gnu,wasm32-unknown-unknown
                  shared-key: origa-linux

            - name: Setup frontend tools
              uses: ./.github/actions/setup-frontend
              with:
                  tools: trunk tauri-cli
                  cache-key-suffix: linux

            - name: Add cargo bin to PATH
              run: echo "$HOME/.cargo/bin" >> $GITHUB_PATH

            - name: Build frontend
              working-directory: origa_ui
              run: trunk build --release
              env:
                  TRAILBASE_URL: ${{ vars.TRAILBASE_URL }}
                  ORIGA_CDN_BASE_URL: ${{ vars.ORIGA_CDN_BASE_URL }}
                  ORIGA_CDN_REGION: ${{ vars.ORIGA_CDN_REGION }}

            - name: Build Tauri app for Linux
              working-directory: tauri
              run: cargo tauri build --target x86_64-unknown-linux-gnu

            - name: Rename artifacts for latest release
              if: needs.version.outputs.version_type != 'stable'
              working-directory: target/x86_64-unknown-linux-gnu/release/bundle
              run: |
                  # Rename AppImage
                  for f in appimage/*.AppImage; do mv "$f" "appimage/origa_latest_amd64.AppImage"; done
                  for f in appimage/*.sig; do mv "$f" "appimage/origa_latest_amd64.AppImage.sig"; done
                  # Rename DEB
                  for f in deb/*.deb; do mv "$f" "deb/origa_latest_amd64.deb"; done

            - name: Extract signature
              id: signature
              shell: bash
              run: |
                  SIG_FILE=$(ls target/x86_64-unknown-linux-gnu/release/bundle/appimage/*.sig 2>/dev/null | head -1 || true)
                  if [ -n "$SIG_FILE" ] && [ -f "$SIG_FILE" ]; then
                    SIG_CONTENT=$(cat "$SIG_FILE")
                    echo "signature=${SIG_CONTENT}" >> $GITHUB_OUTPUT
                  else
                    echo "signature=" >> $GITHUB_OUTPUT
                  fi

            - name: Upload Linux artifacts
              uses: actions/upload-artifact@v4
              with:
                  name: linux-build
                  path: |
                      **/bundle/appimage/*.AppImage
                      **/bundle/appimage/*.sig
                      **/bundle/deb/*.deb
                  retention-days: 7

    build-macos:
        name: Build macOS
        needs: [version]
        if: >
            github.event_name == 'pull_request' ||
            github.event_name == 'push' ||
            github.event_name == 'workflow_dispatch' ||
            (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success')
        runs-on: ubuntu-latest
        container:
            image: ghcr.io/rust-cross/cargo-zigbuild
        permissions:
            contents: write
        outputs:
            signature: ${{ steps.signature.outputs.signature }}
        env:
            ORIGA_VERSION: ${{ needs.version.outputs.version }}
            ORIGA_COMMIT: ${{ needs.version.outputs.commit_sha }}
            ORIGA_BUILD_DATE: ${{ needs.version.outputs.build_date }}
            TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY || vars.TAURI_CI_DUMMY_PRIVATE_KEY }}
            TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}

        steps:
            - name: Checkout repository
              uses: actions/checkout@v4

            - name: Setup cargo cache
              uses: Swatinem/rust-cache@v2
              with:
                  cache-all-crates: true
                  cache-targets: false
                  shared-key: origa-cross-build
                  save-if: ${{ github.ref == 'refs/heads/master' }}

            - name: Cache UniDic dictionary
              uses: actions/cache@v4
              with:
                  path: origa_ui/public/dictionaries/unidic
                  key: unidic-dict-v1-${{ hashFiles('origa_ui/build.rs') }}
                  restore-keys: unidic-dict-v1-

            - name: Update version in config files
              uses: ./.github/actions/update-version
              with:
                  version: ${{ needs.version.outputs.version_base }}

            - name: Install build dependencies
              run: apt-get update && apt-get install -y zip protobuf-compiler

            - name: Setup Rust targets
              run: rustup target add x86_64-apple-darwin aarch64-apple-darwin
                  wasm32-unknown-unknown

            - name: Install cargo-binstall
              run: |
                  tmp=$(mktemp) && curl -L --proto '=https' --tlsv1.2 -sSf -o "$tmp" https://raw.githubusercontent.com/cargo-bins/cargo-binstall/main/install-from-binstall-release.sh && bash "$tmp"
                  cargo binstall trunk tauri-cli --no-confirm --force

            - name: Add cargo bin to PATH
              run: echo "$HOME/.cargo/bin" >> $GITHUB_PATH

            - name: Build frontend
              working-directory: origa_ui
              run: trunk build --release
              env:
                  TRAILBASE_URL: ${{ vars.TRAILBASE_URL }}
                  ORIGA_CDN_BASE_URL: ${{ vars.ORIGA_CDN_BASE_URL }}
                  ORIGA_CDN_REGION: ${{ vars.ORIGA_CDN_REGION }}

            - name: Build Tauri app for macOS
              working-directory: tauri
              run:
                  cargo tauri build --runner cargo-zigbuild --target aarch64-apple-darwin
                  --no-bundle

            - name: Extract signature
              id: signature
              shell: bash
              run: echo "signature=" >> $GITHUB_OUTPUT

            - name: Create macOS app bundle
              run: |
                  mkdir -p Origa.app/Contents/MacOS
                  mkdir -p Origa.app/Contents/Resources
                  cp target/aarch64-apple-darwin/release/origa-app Origa.app/Contents/MacOS/origa
                  cat > Origa.app/Contents/Info.plist << EOF
                  <?xml version="1.0" encoding="UTF-8"?>
                  <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
                  <plist version="1.0">
                  <dict>
                    <key>CFBundleIdentifier</key>
                    <string>net.uwuwu.origa</string>
                    <key>CFBundleName</key>
                    <string>Origa</string>
                    <key>CFBundleDisplayName</key>
                    <string>Origa</string>
                    <key>CFBundleVersion</key>
                    <string>${{ needs.version.outputs.version }}</string>
                    <key>CFBundleShortVersionString</key>
                    <string>${{ needs.version.outputs.version }}</string>
                    <key>CFBundleExecutable</key>
                    <string>origa</string>
                    <key>CFBundlePackageType</key>
                    <string>APPL</string>
                  </dict>
                  </plist>
                  EOF
                  chmod +x Origa.app/Contents/MacOS/origa
                  zip -r Origa-macos-arm64.zip Origa.app

            - name: Upload macOS artifacts
              uses: actions/upload-artifact@v4
              with:
                  name: macos-build
                  path: Origa-macos-arm64.zip
                  retention-days: 7

    build-android:
        name: Build Android
        permissions:
            contents: read
        needs: [version]
        if: >
            github.actor != 'dependabot[bot]' &&
            (github.event_name == 'pull_request' ||
            github.event_name == 'push' ||
            github.event_name == 'workflow_dispatch' ||
            (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success'))
        runs-on: ubuntu-24.04
        env:
            ORIGA_VERSION: ${{ needs.version.outputs.version }}
            ORIGA_COMMIT: ${{ needs.version.outputs.commit_sha }}
            ORIGA_BUILD_DATE: ${{ needs.version.outputs.build_date }}
        steps:
            - name: Checkout repository
              uses: actions/checkout@v4

            - name: Update version in config files
              uses: ./.github/actions/update-version
              with:
                  version: ${{ needs.version.outputs.version_base }}

            - name: Install system dependencies
              run: |
                  sudo apt-get update
                  sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf protobuf-compiler

            - name: Setup Rust with caching
              uses: ./.github/actions/setup-rust
              with:
                  targets: wasm32-unknown-unknown,aarch64-linux-android
                  shared-key: origa-mobile

            - name: Setup Java
              uses: actions/setup-java@v4
              with:
                  distribution: temurin
                  java-version: 21

            - name: Setup Android SDK
              uses: android-actions/setup-android@v3

            - name: Setup Android NDK
              uses: nttld/setup-ndk@v1
              id: setup-ndk
              with:
                  ndk-version: r26b
                  local-cache: true

            - name: Cache Gradle
              uses: actions/cache@v4
              with:
                  path: |
                      ~/.gradle/caches
                      ~/.gradle/wrapper
                  key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*',
                      '**/gradle-wrapper.properties') }}
                  restore-keys: |
                      ${{ runner.os }}-gradle-

            - name: Setup frontend tools
              uses: ./.github/actions/setup-frontend
              with:
                  tools: trunk tauri-cli
                  cache-key-suffix: android

            - name: Add cargo bin to PATH
              run: echo "$HOME/.cargo/bin" >> $GITHUB_PATH

            - name: Build frontend
              working-directory: origa_ui
              run: trunk build --release
              env:
                  TRAILBASE_URL: ${{ vars.TRAILBASE_URL }}
                  ORIGA_CDN_BASE_URL: ${{ vars.ORIGA_CDN_BASE_URL }}
                  ORIGA_CDN_REGION: ${{ vars.ORIGA_CDN_REGION }}

            - name: Decode Android Keystore
              env:
                  ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
              run: |
                  echo "Decoding Android keystore..."
                  echo "$ANDROID_KEYSTORE_BASE64" | base64 --decode > /tmp/keystore.jks
                  echo "Keystore decoded successfully"

            - name: Configure Android Signing
              working-directory: tauri/gen/android
              run: |
                  cat > keystore.properties << EOF
                  storePassword=${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
                  keyPassword=${{ secrets.ANDROID_KEY_PASSWORD }}
                  keyAlias=${{ secrets.ANDROID_KEY_ALIAS }}
                  storeFile=/tmp/keystore.jks
                  EOF

            - name: Install Tauri CLI (npm)
              working-directory: tauri
              run: npm install

            - name: Build Tauri Android APK
              working-directory: tauri
              run: |
                  echo "=== Debug info ==="
                  echo "NDK_HOME=$NDK_HOME"
                  echo "ANDROID_NDK_ROOT=$ANDROID_NDK_ROOT"
                  echo "=== Start build ==="
                  cargo tauri android build 2>&1 || (echo "Build failed with exit code $?"; exit 1)
              env:
                  NDK_HOME: ${{ steps.setup-ndk.outputs.ndk-path }}
                  ANDROID_NDK_ROOT: ${{ steps.setup-ndk.outputs.ndk-path }}

            - name: Rename APK for latest release
              if: needs.version.outputs.version_type != 'stable'
              working-directory: tauri/gen/android/app/build/outputs/apk
              run: |
                  for f in release/*.apk; do
                    if [ -f "$f" ]; then
                      mv "$f" "release/origa-latest.apk"
                      echo "Renamed to origa-latest.apk"
                    fi
                  done

            - name: Upload Android APK
              uses: actions/upload-artifact@v4
              with:
                  name: android-apk
                  path: tauri/gen/android/app/build/outputs/apk/**/*.apk
                  retention-days: 7
    generate-latest-json:
        name: Generate latest.json
        if: >
            github.event_name == 'push' ||
            github.event_name == 'workflow_dispatch' ||
            (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success')
        needs: [version, build-windows, build-linux, build-macos, build-android]
        runs-on: ubuntu-latest
        permissions:
            contents: write
        steps:
            - name: Generate latest.json
              env:
                  VERSION: ${{ needs.version.outputs.version }}
                  VERSION_TYPE: ${{ needs.version.outputs.version_type }}
                  WIN_SIG: ${{ needs.build-windows.outputs.signature }}
                  LINUX_SIG: ${{ needs.build-linux.outputs.signature }}
              run: |
                  if [ "$VERSION_TYPE" != "stable" ]; then
                    FILE_VERSION="latest"
                  else
                    FILE_VERSION="${VERSION}"
                  fi
                  jq -n \
                    --arg version "$VERSION" \
                    --arg notes "Release $VERSION" \
                    --arg pub_date "$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
                    --arg win_sig "$WIN_SIG" \
                    --arg linux_sig "$LINUX_SIG" \
                    --arg win_url "https://github.com/yurvon-screamo/origa/releases/download/${FILE_VERSION}/origa_${FILE_VERSION}_x64-setup.exe" \
                    --arg linux_url "https://github.com/yurvon-screamo/origa/releases/download/${FILE_VERSION}/origa_${FILE_VERSION}_amd64.AppImage" \
                    '{
                      version: $version,
                      notes: $notes,
                      pub_date: $pub_date,
                      platforms: {
                        "windows-x86_64": {
                          signature: $win_sig,
                          url: $win_url
                        },
                        "linux-x86_64": {
                          signature: $linux_sig,
                          url: $linux_url
                        }
                      }
                    }' > latest.json
                  cat latest.json

            - name: Upload latest.json artifact
              uses: actions/upload-artifact@v4
              with:
                  name: latest-json
                  path: latest.json
                  retention-days: 7

    release:
        name: Update Latest Release
        if: >
            github.event_name == 'push' ||
            github.event_name == 'workflow_dispatch' ||
            (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success')
        needs:
            [
                version,
                build-windows,
                build-linux,
                build-macos,
                build-android,
                generate-latest-json,
            ]
        runs-on: ubuntu-latest
        permissions:
            contents: write
        steps:
            - name: Download all artifacts
              uses: actions/download-artifact@v4
              with:
                  path: artifacts

            - name: Prepare release assets
              run: |
                  mkdir -p release_assets
                  find artifacts -type f -exec mv {} release_assets/ \;
                  echo "Release assets content:"
                  ls -la release_assets/

            - name: Update latest release
              uses: softprops/action-gh-release@v2
              with:
                  tag_name:
                      ${{ needs.version.outputs.version_type == 'stable' &&
                      needs.version.outputs.version || 'latest' }}
                  name: ${{ needs.version.outputs.version_type == 'stable' &&
                      format('Release {0}', needs.version.outputs.version) || format('Latest
                      Build ({0})', needs.version.outputs.version) }}
                  body: |
                      Автоматическая сборка от ${{ github.sha }}

                      ## Windows
                      - `origa_*_x64-setup.exe` - NSIS инсталлятор

                      ## Linux
                      - `*.AppImage` - Portable версия
                      - `*.deb` - Debian/Ubuntu пакет

                      ## macOS
                      - `Origa-macos-arm64.zip` - Apple Silicon

                      ## Android
                      - `origa-latest.apk` - Android APK
                  generate_release_notes: true
                  files: release_assets/*
                  prerelease: ${{ needs.version.outputs.version_type != 'stable' }}
                  draft: false
                  make_latest: true
