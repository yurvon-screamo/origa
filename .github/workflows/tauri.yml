name: Build Tauri App

on:
    push:
        tags:
            - "v*.*.*"
    workflow_dispatch:

concurrency:
    group: tauri-${{ github.ref }}
    cancel-in-progress: true

env:
    CARGO_TERM_COLOR: always

permissions:
    contents: read

jobs:
    version:
        permissions:
            contents: read
        runs-on: ubuntu-latest
        outputs:
            version: ${{ steps.version.outputs.version }}
            version_base: ${{ steps.version.outputs.version_base }}
            version_type: ${{ steps.version.outputs.version_type }}
            commit_sha: ${{ steps.version.outputs.commit_sha }}
            commit_short: ${{ steps.version.outputs.commit_short }}
            build_date: ${{ steps.version.outputs.build_date }}
        steps:
            - uses: actions/checkout@v4
              with:
                  fetch-depth: 0
                  filter: blob:none

            - name: Calculate version
              id: version
              uses: ./.github/actions/version

    build-frontend:
        name: Build Frontend
        permissions:
            contents: read
        needs: [version]
        runs-on: ubuntu-24.04
        env:
            ORIGA_VERSION: ${{ needs.version.outputs.version }}
            ORIGA_COMMIT: ${{ needs.version.outputs.commit_sha }}
            ORIGA_BUILD_DATE: ${{ needs.version.outputs.build_date }}
        steps:
            - name: Checkout repository
              uses: actions/checkout@v4

            - name: Update version in config files
              uses: ./.github/actions/update-version
              with:
                  version: ${{ needs.version.outputs.version }}

            - name: Cache APT packages
              uses: awalsh128/cache-apt-pkgs-action@v1.6.1
              with:
                  packages:
                      libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf
                      protobuf-compiler libspeechd-dev
                  version: 1.0

            - name: Setup Rust with caching
              uses: ./.github/actions/setup-rust
              with:
                  targets: wasm32-unknown-unknown
                  shared-key: origa-ci-v2

            - name: Setup frontend tools
              uses: ./.github/actions/setup-frontend
              with:
                  tools: trunk

            - name: Add cargo bin to PATH
              run: echo "$HOME/.cargo/bin" >> $GITHUB_PATH

            - name: Build frontend
              working-directory: origa_ui
              run: trunk build --release
              env:
                  TRAILBASE_URL: ${{ vars.TRAILBASE_URL }}
                  ORIGA_CDN_BASE_URL: ${{ vars.ORIGA_CDN_BASE_URL }}
                  ORIGA_CDN_REGION: ${{ vars.ORIGA_CDN_REGION }}

            - name: Upload frontend artifact
              uses: actions/upload-artifact@v4
              with:
                  name: frontend-dist
                  path: origa_ui/dist/
                  retention-days: 1

    build-tauri:
        name: Build Tauri
        needs: [version, build-frontend]
        uses: ./.github/workflows/_build-tauri.yml
        with:
            version: ${{ needs.version.outputs.version }}
            version_base: ${{ needs.version.outputs.version_base }}
            version_type: ${{ needs.version.outputs.version_type }}
            commit_sha: ${{ needs.version.outputs.commit_sha }}
            build_date: ${{ needs.version.outputs.build_date }}
            wasm_artifact_name: frontend-dist
            platforms: "windows,linux,macos,android"
            skip_android: ${{ github.actor == 'dependabot[bot]' }}
        secrets:
            tauri-signing-private-key: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY || vars.TAURI_CI_DUMMY_PRIVATE_KEY }}
            tauri-signing-private-key-password: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
            android-keystore-base64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
            android-keystore-password: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
            android-key-password: ${{ secrets.ANDROID_KEY_PASSWORD }}
            android-key-alias: ${{ secrets.ANDROID_KEY_ALIAS }}

    generate-latest-json:
        name: Generate latest.json
        if: startsWith(github.ref, 'refs/tags/v') && needs.version.outputs.version_type == 'stable'
        needs: [version, build-tauri]
        runs-on: ubuntu-latest
        permissions:
            contents: write
        steps:
            - name: Generate latest.json
              env:
                  VERSION: ${{ needs.version.outputs.version }}
                  GIT_TAG: ${{ github.ref_name }}
                  WIN_SIG: ${{ needs.build-tauri.outputs.windows-signature }}
                  LINUX_SIG: ${{ needs.build-tauri.outputs.linux-signature }}
              run: |
                  # Stable-only: prereleases deliberately do NOT refresh the
                  # updater manifest, so users on the stable channel never get
                  # auto-updated to an rc build. The URL tag segment is the git
                  # tag (v-prefixed, e.g. v1.0.0) — it MUST match the release's
                  # tag_name (github.ref_name), not the stripped version. The
                  # asset filename segment is the fixed-name alias
                  # (Origa_x64-setup.exe / Origa_amd64.AppImage) — single-naming
                  # per ADR-025 addendum; only the alias asset exists in the
                  # release. The manifest's `version` field is the bare version
                  # (1.0.0) the updater compares against. Signature is
                  # content-based (Minisign), so it stays valid after the
                  # versioned → alias rename in _build-tauri.yml.
                  jq -n \
                    --arg version "$VERSION" \
                    --arg notes "Release $VERSION" \
                    --arg pub_date "$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
                    --arg win_sig "$WIN_SIG" \
                    --arg linux_sig "$LINUX_SIG" \
                    --arg win_url "https://github.com/yurvon-screamo/origa/releases/download/${GIT_TAG}/Origa_x64-setup.exe" \
                    --arg linux_url "https://github.com/yurvon-screamo/origa/releases/download/${GIT_TAG}/Origa_amd64.AppImage" \
                    '{
                      version: $version,
                      notes: $notes,
                      pub_date: $pub_date,
                      platforms: {
                        "windows-x86_64": {
                          signature: $win_sig,
                          url: $win_url
                        },
                        "linux-x86_64": {
                          signature: $linux_sig,
                          url: $linux_url
                        }
                      }
                    }' > latest.json
                  cat latest.json

            - name: Upload latest.json artifact
              uses: actions/upload-artifact@v4
              with:
                  name: latest-json
                  path: latest.json
                  retention-days: 7

    release:
        name: Publish Release
        if: >
            always() &&
            needs.build-tauri.result == 'success' &&
            startsWith(github.ref, 'refs/tags/v') &&
            (needs.version.outputs.version_type == 'stable' ||
             needs.version.outputs.version_type == 'prerelease') &&
            (needs.version.outputs.version_type != 'stable' ||
             needs.generate-latest-json.result == 'success')
        needs:
            [
                version,
                build-tauri,
                generate-latest-json,
            ]
        runs-on: ubuntu-latest
        permissions:
            contents: write
        steps:
            - name: Download all artifacts
              uses: actions/download-artifact@v8
              with:
                  path: artifacts

            - name: Prepare release assets
              run: |
                  mkdir -p release_assets
                  # Keep only installable bundles + the updater manifest. Each
                  # platform ships a single fixed-name asset per ADR-025
                  # addendum (no versioned duplicate) so /releases/latest/download/
                  # <alias> resolves for the landing page. Intermediate artifacts
                  # (frontend-dist WASM, *.sig signatures already embedded into
                  # latest.json) are excluded so the release stays small.
                  # cp -f (not -n): every tag is a fresh release, no accumulation.
                  find artifacts -type f \( \
                      -name '*-setup.exe' -o \
                      -name '*.msi' -o \
                      -name '*.AppImage' -o \
                      -name '*.deb' -o \
                      -name '*.dmg' -o \
                      -name 'Origa_macos-arm64.zip' -o \
                      -name '*.apk' -o \
                      -name 'latest.json' \
                  \) -exec cp -f {} release_assets/ \;
                  echo "Release assets content:"
                  ls -la release_assets/

            - name: Publish release
              uses: softprops/action-gh-release@v2
              with:
                  tag_name: ${{ github.ref_name }}
                  name: ${{ needs.version.outputs.version_type == 'prerelease' && format('Pre-release {0}', needs.version.outputs.version) || format('Release {0}', needs.version.outputs.version) }}
                  body: |
                      ${{ needs.version.outputs.version_type == 'prerelease' && 'Pre-release build — not for the stable update channel.' || format('Release {0}', needs.version.outputs.version) }}

                      Commit: ${{ github.sha }}

                      ## Windows
                      - `Origa_x64-setup.exe` — NSIS installer (single-name, no versioned duplicate per ADR-025 addendum)

                      ## Linux
                      - `Origa_amd64.AppImage` — portable
                      - `Origa_amd64.deb` — Debian/Ubuntu

                      ## macOS
                      - `Origa_macos-arm64.zip` — Apple Silicon

                      ## Android
                      - `origa.apk`

                      ## Updater
                      - `latest.json` — Tauri updater manifest (stable releases only)
                  generate_release_notes: true
                  files: release_assets/*
                  prerelease: ${{ needs.version.outputs.version_type == 'prerelease' }}
                  draft: false
                  make_latest: ${{ needs.version.outputs.version_type == 'stable' }}
