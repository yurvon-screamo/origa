name: Build Tauri App

on:
  push:
    branches:
      - master
    tags:
      - 'v*.*.*'
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  version:
    uses: ./.github/workflows/version.yml

  build-windows:
    name: Build Windows
    needs: [version]
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/rust-cross/cargo-zigbuild
    permissions:
      contents: write
    outputs:
      signature: ${{ steps.signature.outputs.signature }}
    env:
      SCCACHE_IGNORE_SERVER_IO_ERROR: "1"
      ORIGA_VERSION: ${{ needs.version.outputs.version }}
      ORIGA_COMMIT: ${{ needs.version.outputs.commit_sha }}
      ORIGA_BUILD_DATE: ${{ needs.version.outputs.build_date }}
      TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
      TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup sccache
        uses: mozilla-actions/sccache-action@v0.0.6

      - name: Cache Cargo (container)
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ${{ runner.os }}-cargo-container-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-container-

      - name: Cache cargo-binstall
        uses: actions/cache@v4
        with:
          path: ~/.cargo/bin
          key: cargo-binstall-windows-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: cargo-binstall-windows-

      - name: Cache UniDic dictionary
        uses: actions/cache@v4
        with:
          path: origa_ui/public/dictionaries/unidic
          key: unidic-dict-v1-${{ hashFiles('origa_ui/build.rs') }}
          restore-keys: unidic-dict-v1-

      - name: Update version in config files
        env:
          VERSION: ${{ needs.version.outputs.version_base }}
        run: |
          # Обновить версию в Cargo.toml (workspace)
          sed -i 's/^version = ".*"/version = "'${VERSION}'"/' Cargo.toml
          
          # Обновить версию в tauri.conf.json
          sed -i 's/"version": ".*"/"version": "'${VERSION}'"/' tauri/tauri.conf.json
          
          echo "Updated version to ${VERSION}"

      - name: Install build dependencies
        run: apt-get update && apt-get install -y nsis clang lld llvm protobuf-compiler

      - name: Setup Rust targets
        run: rustup target add x86_64-pc-windows-msvc wasm32-unknown-unknown

      - name: Install cargo-binstall
        run: |
          curl -L --proto '=https' --tlsv1.2 -sSf https://raw.githubusercontent.com/cargo-bins/cargo-binstall/main/install-from-binstall-release.sh | bash
          cargo binstall trunk tauri-cli cargo-xwin --no-confirm --force

      - name: Add cargo bin to PATH
        run: echo "$HOME/.cargo/bin" >> $GITHUB_PATH

      - name: Build frontend
        working-directory: origa_ui
        run: trunk build --release
        env:
          SCCACHE_IGNORE_SERVER_IO_ERROR: "1"
          SCCACHE_GHA_ENABLED: "true"
          RUSTC_WRAPPER: "sccache"
          TRAILBASE_URL: ${{ vars.TRAILBASE_URL }}

      - name: Build Tauri app for Windows
        working-directory: tauri
        run: cargo tauri build --runner cargo-xwin --target x86_64-pc-windows-msvc
        env:
          SCCACHE_IGNORE_SERVER_IO_ERROR: "1"
          SCCACHE_GHA_ENABLED: "true"
          RUSTC_WRAPPER: "sccache"
          TAURI_BUNDLE_NSIS: "true"

      - name: Extract signature
        id: signature
        shell: bash
        run: |
          SIG_FILE=$(ls target/x86_64-pc-windows-msvc/release/bundle/nsis/*.sig 2>/dev/null | head -1 || true)
          if [ -n "$SIG_FILE" ] && [ -f "$SIG_FILE" ]; then
            SIG_CONTENT=$(cat "$SIG_FILE")
            echo "signature=${SIG_CONTENT}" >> $GITHUB_OUTPUT
          else
            echo "signature=" >> $GITHUB_OUTPUT
          fi

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-build
          path: |
            **/bundle/nsis/*.exe
            **/bundle/nsis/*.sig
            **/bundle/msi/*.msi
          retention-days: 7

  build-linux:
    name: Build Linux
    needs: [version]
    runs-on: ubuntu-22.04
    permissions:
      contents: write
    outputs:
      signature: ${{ steps.signature.outputs.signature }}
    env:
      ORIGA_VERSION: ${{ needs.version.outputs.version }}
      ORIGA_COMMIT: ${{ needs.version.outputs.commit_sha }}
      ORIGA_BUILD_DATE: ${{ needs.version.outputs.build_date }}
      TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
      TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Cache UniDic dictionary
        uses: actions/cache@v4
        with:
          path: origa_ui/public/dictionaries/unidic
          key: unidic-dict-v1-${{ hashFiles('origa_ui/build.rs') }}
          restore-keys: unidic-dict-v1-

      - name: Update version in config files
        env:
          VERSION: ${{ needs.version.outputs.version_base }}
        run: |
          # Обновить версию в Cargo.toml (workspace)
          sed -i 's/^version = ".*"/version = "'${VERSION}'"/' Cargo.toml
          
          # Обновить версию в tauri.conf.json
          sed -i 's/"version": ".*"/"version": "'${VERSION}'"/' tauri/tauri.conf.json
          
          echo "Updated version to ${VERSION}"

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf protobuf-compiler

      - name: Setup Rust with caching
        uses: ./.github/actions/setup-rust
        with:
          targets: x86_64-unknown-linux-gnu,wasm32-unknown-unknown

      - name: Setup frontend tools
        uses: ./.github/actions/setup-frontend
        with:
          tools: trunk tauri-cli
          cache-key-suffix: linux

      - name: Add cargo bin to PATH
        run: echo "$HOME/.cargo/bin" >> $GITHUB_PATH

      - name: Build frontend
        working-directory: origa_ui
        run: trunk build --release
        env:
          TRAILBASE_URL: ${{ vars.TRAILBASE_URL }}

      - name: Build Tauri app for Linux
        working-directory: tauri
        run: cargo tauri build --target x86_64-unknown-linux-gnu

      - name: Extract signature
        id: signature
        shell: bash
        run: |
          SIG_FILE=$(ls target/x86_64-unknown-linux-gnu/release/bundle/appimage/*.sig 2>/dev/null | head -1 || true)
          if [ -n "$SIG_FILE" ] && [ -f "$SIG_FILE" ]; then
            SIG_CONTENT=$(cat "$SIG_FILE")
            echo "signature=${SIG_CONTENT}" >> $GITHUB_OUTPUT
          else
            echo "signature=" >> $GITHUB_OUTPUT
          fi

      - name: Upload Linux artifacts
        uses: actions/upload-artifact@v4
        with:
          name: linux-build
          path: |
            **/bundle/appimage/*.AppImage
            **/bundle/appimage/*.sig
            **/bundle/deb/*.deb
          retention-days: 7

  build-macos:
    name: Build macOS
    needs: [version]
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/rust-cross/cargo-zigbuild
    permissions:
      contents: write
    outputs:
      signature: ${{ steps.signature.outputs.signature }}
    env:
      SCCACHE_IGNORE_SERVER_IO_ERROR: "1"
      ORIGA_VERSION: ${{ needs.version.outputs.version }}
      ORIGA_COMMIT: ${{ needs.version.outputs.commit_sha }}
      ORIGA_BUILD_DATE: ${{ needs.version.outputs.build_date }}
      TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
      TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup sccache
        uses: mozilla-actions/sccache-action@v0.0.6

      - name: Cache Cargo (container)
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ${{ runner.os }}-cargo-container-macos-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-container-macos-

      - name: Cache cargo-binstall
        uses: actions/cache@v4
        with:
          path: ~/.cargo/bin
          key: cargo-binstall-macos-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: cargo-binstall-macos-

      - name: Cache UniDic dictionary
        uses: actions/cache@v4
        with:
          path: origa_ui/public/dictionaries/unidic
          key: unidic-dict-v1-${{ hashFiles('origa_ui/build.rs') }}
          restore-keys: unidic-dict-v1-

      - name: Update version in config files
        env:
          VERSION: ${{ needs.version.outputs.version_base }}
        run: |
          # Обновить версию в Cargo.toml (workspace)
          sed -i 's/^version = ".*"/version = "'${VERSION}'"/' Cargo.toml
          
          # Обновить версию в tauri.conf.json
          sed -i 's/"version": ".*"/"version": "'${VERSION}'"/' tauri/tauri.conf.json
          
          echo "Updated version to ${VERSION}"

      - name: Install build dependencies
        run: apt-get update && apt-get install -y zip protobuf-compiler

      - name: Setup Rust targets
        run: rustup target add x86_64-apple-darwin aarch64-apple-darwin wasm32-unknown-unknown

      - name: Install cargo-binstall
        run: |
          curl -L --proto '=https' --tlsv1.2 -sSf https://raw.githubusercontent.com/cargo-bins/cargo-binstall/main/install-from-binstall-release.sh | bash
          cargo binstall trunk tauri-cli --no-confirm --force

      - name: Add cargo bin to PATH
        run: echo "$HOME/.cargo/bin" >> $GITHUB_PATH

      - name: Build frontend
        working-directory: origa_ui
        run: trunk build --release
        env:
          SCCACHE_IGNORE_SERVER_IO_ERROR: "1"
          SCCACHE_GHA_ENABLED: "true"
          RUSTC_WRAPPER: "sccache"
          TRAILBASE_URL: ${{ vars.TRAILBASE_URL }}

      - name: Build Tauri app for macOS
        working-directory: tauri
        run: cargo tauri build --runner cargo-zigbuild --target aarch64-apple-darwin --no-bundle
        env:
          SCCACHE_IGNORE_SERVER_IO_ERROR: "1"
          SCCACHE_GHA_ENABLED: "true"
          RUSTC_WRAPPER: "sccache"

      - name: Extract signature
        id: signature
        shell: bash
        run: echo "signature=" >> $GITHUB_OUTPUT

      - name: Create macOS app bundle
        run: |
          mkdir -p Origa.app/Contents/MacOS
          mkdir -p Origa.app/Contents/Resources
          cp target/aarch64-apple-darwin/release/origa-app Origa.app/Contents/MacOS/origa
          cat > Origa.app/Contents/Info.plist << EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>CFBundleIdentifier</key>
            <string>net.uwuwu.origa</string>
            <key>CFBundleName</key>
            <string>Origa</string>
            <key>CFBundleDisplayName</key>
            <string>Origa</string>
            <key>CFBundleVersion</key>
            <string>${{ needs.version.outputs.version }}</string>
            <key>CFBundleShortVersionString</key>
            <string>${{ needs.version.outputs.version }}</string>
            <key>CFBundleExecutable</key>
            <string>origa</string>
            <key>CFBundlePackageType</key>
            <string>APPL</string>
          </dict>
          </plist>
          EOF
          chmod +x Origa.app/Contents/MacOS/origa
          zip -r Origa-macos-arm64.zip Origa.app

      - name: Upload macOS artifacts
        uses: actions/upload-artifact@v4
        with:
          name: macos-build
          path: Origa-macos-arm64.zip
          retention-days: 7

  generate-latest-json:
    name: Generate latest.json
    needs: [version, build-windows, build-linux, build-macos]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Generate latest.json
        env:
          VERSION: ${{ needs.version.outputs.version }}
          WIN_SIG: ${{ needs.build-windows.outputs.signature }}
          LINUX_SIG: ${{ needs.build-linux.outputs.signature }}
        run: |
          cat > latest.json << EOF
          {
            "version": "${VERSION}",
            "notes": "Release ${VERSION}",
            "pub_date": "$(date -u +%Y-%m-%dT%H:%M:%SZ)",
            "platforms": {
              "windows-x86_64": {
                "signature": "${WIN_SIG}",
                "url": "https://github.com/yurvon-screamo/origa/releases/download/${VERSION}/origa_${VERSION}_x64-setup.exe"
              },
              "linux-x86_64": {
                "signature": "${LINUX_SIG}",
                "url": "https://github.com/yurvon-screamo/origa/releases/download/${VERSION}/origa_${VERSION}_amd64.AppImage"
              }
            }
          }
          EOF
          cat latest.json

      - name: Upload latest.json artifact
        uses: actions/upload-artifact@v4
        with:
          name: latest-json
          path: latest.json
          retention-days: 7

  release:
    name: Update Latest Release
    needs: [version, build-windows, build-linux, build-macos, generate-latest-json]
    uses: ./.github/workflows/reusable-release.yml
    with:
      tag-name: ${{ needs.version.outputs.version_type == 'stable' && needs.version.outputs.version || 'latest' }}
      release-name: ${{ needs.version.outputs.version_type == 'stable' && format('Release {0}', needs.version.outputs.version) || 'Latest Build' }}
      version-type: ${{ needs.version.outputs.version_type }}
      make-latest: ${{ needs.version.outputs.version_type == 'stable' }}
      prerelease: ${{ needs.version.outputs.version_type != 'stable' }}
      body: |
        Автоматическая сборка от ${{ github.sha }}

        ## Windows
        - `origa_*_x64-setup.exe` - NSIS инсталлятор
        - `origa_*_x64_en-US.msi` - MSI инсталлятор

        ## Linux
        - `*.AppImage` - Portable версия
        - `*.deb` - Debian/Ubuntu пакет

        ## macOS
        - `Origa-macos-arm64.zip` - Apple Silicon
    permissions:
      contents: write
