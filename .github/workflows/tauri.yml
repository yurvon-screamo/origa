name: Build Tauri App

on:
    workflow_run:
        workflows: ["CI"]
        types: [completed]
        branches: [master]
    push:
        tags:
            - "v*.*.*"
    workflow_dispatch:

concurrency:
    group: tauri-${{ github.ref }}
    cancel-in-progress: true

env:
    CARGO_TERM_COLOR: always

permissions:
    contents: read

jobs:
    version:
        permissions:
            contents: read
        runs-on: ubuntu-latest
        outputs:
            version: ${{ steps.version.outputs.version }}
            version_base: ${{ steps.version.outputs.version_base }}
            version_type: ${{ steps.version.outputs.version_type }}
            commit_sha: ${{ steps.version.outputs.commit_sha }}
            commit_short: ${{ steps.version.outputs.commit_short }}
            build_date: ${{ steps.version.outputs.build_date }}
        steps:
            - uses: actions/checkout@v4
              with:
                  fetch-depth: 0
                  filter: blob:none

            - name: Calculate version
              id: version
              uses: ./.github/actions/version

    build-frontend:
        name: Build Frontend
        permissions:
            contents: read
        needs: [version]
        if: >
            github.event_name == 'push' ||
            github.event_name == 'workflow_dispatch' ||
            (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success')
        runs-on: ubuntu-24.04
        env:
            ORIGA_VERSION: ${{ needs.version.outputs.version }}
            ORIGA_COMMIT: ${{ needs.version.outputs.commit_sha }}
            ORIGA_BUILD_DATE: ${{ needs.version.outputs.build_date }}
        steps:
            - name: Checkout repository
              uses: actions/checkout@v4

            - name: Update version in config files
              uses: ./.github/actions/update-version
              with:
                  version: ${{ needs.version.outputs.version_base }}

            - name: Cache APT packages
              uses: awalsh128/cache-apt-pkgs-action@v1.6.1
              with:
                  packages:
                      libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf
                      protobuf-compiler libspeechd-dev
                  version: 1.0

            - name: Setup Rust with caching
              uses: ./.github/actions/setup-rust
              with:
                  targets: wasm32-unknown-unknown
                  shared-key: origa-ci-v2

            - name: Setup frontend tools
              uses: ./.github/actions/setup-frontend
              with:
                  tools: trunk

            - name: Add cargo bin to PATH
              run: echo "$HOME/.cargo/bin" >> $GITHUB_PATH

            - name: Build frontend
              working-directory: origa_ui
              run: trunk build --release
              env:
                  TRAILBASE_URL: ${{ vars.TRAILBASE_URL }}
                  ORIGA_CDN_BASE_URL: ${{ vars.ORIGA_CDN_BASE_URL }}
                  ORIGA_CDN_REGION: ${{ vars.ORIGA_CDN_REGION }}

            - name: Upload frontend artifact
              uses: actions/upload-artifact@v4
              with:
                  name: frontend-dist
                  path: origa_ui/dist/
                  retention-days: 1

    build-tauri:
        name: Build Tauri
        needs: [version, build-frontend]
        if: >
            github.event_name == 'push' ||
            github.event_name == 'workflow_dispatch' ||
            (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success')
        uses: ./.github/workflows/_build-tauri.yml
        with:
            version: ${{ needs.version.outputs.version }}
            version_base: ${{ needs.version.outputs.version_base }}
            version_type: ${{ needs.version.outputs.version_type }}
            commit_sha: ${{ needs.version.outputs.commit_sha }}
            build_date: ${{ needs.version.outputs.build_date }}
            wasm_artifact_name: frontend-dist
            platforms: "windows,linux,macos,android"
            skip_android: ${{ github.actor == 'dependabot[bot]' }}
        secrets:
            tauri-signing-private-key: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY || vars.TAURI_CI_DUMMY_PRIVATE_KEY }}
            tauri-signing-private-key-password: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
            android-keystore-base64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
            android-keystore-password: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
            android-key-password: ${{ secrets.ANDROID_KEY_PASSWORD }}
            android-key-alias: ${{ secrets.ANDROID_KEY_ALIAS }}

    generate-latest-json:
        name: Generate latest.json
        if: >
            github.event_name == 'push' ||
            github.event_name == 'workflow_dispatch' ||
            (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success')
        needs: [version, build-tauri]
        runs-on: ubuntu-latest
        permissions:
            contents: write
        steps:
            - name: Generate latest.json
              env:
                  VERSION: ${{ needs.version.outputs.version }}
                  VERSION_TYPE: ${{ needs.version.outputs.version_type }}
                  WIN_SIG: ${{ needs.build-tauri.outputs.windows-signature }}
                  LINUX_SIG: ${{ needs.build-tauri.outputs.linux-signature }}
              run: |
                  if [ "$VERSION_TYPE" != "stable" ]; then
                    FILE_VERSION="latest"
                  else
                    FILE_VERSION="${VERSION}"
                  fi
                  jq -n \
                    --arg version "$VERSION" \
                    --arg notes "Release $VERSION" \
                    --arg pub_date "$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
                    --arg win_sig "$WIN_SIG" \
                    --arg linux_sig "$LINUX_SIG" \
                    --arg win_url "https://github.com/yurvon-screamo/origa/releases/download/${FILE_VERSION}/origa_${FILE_VERSION}_x64-setup.exe" \
                    --arg linux_url "https://github.com/yurvon-screamo/origa/releases/download/${FILE_VERSION}/origa_${FILE_VERSION}_amd64.AppImage" \
                    '{
                      version: $version,
                      notes: $notes,
                      pub_date: $pub_date,
                      platforms: {
                        "windows-x86_64": {
                          signature: $win_sig,
                          url: $win_url
                        },
                        "linux-x86_64": {
                          signature: $linux_sig,
                          url: $linux_url
                        }
                      }
                    }' > latest.json
                  cat latest.json

            - name: Upload latest.json artifact
              uses: actions/upload-artifact@v4
              with:
                  name: latest-json
                  path: latest.json
                  retention-days: 7

    release:
        name: Update Latest Release
        if: >
            github.event_name == 'push' ||
            github.event_name == 'workflow_dispatch' ||
            (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success')
        needs:
            [
                version,
                build-tauri,
                generate-latest-json,
            ]
        runs-on: ubuntu-latest
        permissions:
            contents: write
        steps:
            - name: Download all artifacts
              uses: actions/download-artifact@v8
              with:
                  path: artifacts

            - name: Prepare release assets
              run: |
                  mkdir -p release_assets
                  find artifacts -type f -exec mv {} release_assets/ \;
                  echo "Release assets content:"
                  ls -la release_assets/

            - name: Update latest release
              uses: softprops/action-gh-release@v2
              with:
                  tag_name:
                      ${{ needs.version.outputs.version_type == 'stable' &&
                      needs.version.outputs.version || 'latest' }}
                  name: ${{ needs.version.outputs.version_type == 'stable' &&
                      format('Release {0}', needs.version.outputs.version) || format('Latest
                      Build ({0})', needs.version.outputs.version) }}
                  body: |
                      Автоматическая сборка от ${{ github.sha }}

                      ## Windows
                      - `origa_*_x64-setup.exe` - NSIS инсталлятор

                      ## Linux
                      - `*.AppImage` - Portable версия
                      - `*.deb` - Debian/Ubuntu пакет

                      ## macOS
                      - `Origa-macos-arm64.zip` - Apple Silicon

                      ## Android
                      - `origa-latest.apk` - Android APK
                  generate_release_notes: true
                  files: release_assets/*
                  prerelease: ${{ needs.version.outputs.version_type != 'stable' }}
                  draft: false
                  make_latest: true
