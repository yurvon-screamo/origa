name: PEPK Extract (temporary)

# Temporary workflow for one-off PEPK extraction (Google Play App Signing opt-in)
# and keystore export for RuStore AAB upload. Delete this file after artifacts
# are downloaded. Branch-guarded to feat/android-debug-symbols only.
#
# Trigger: push to this specific file on feat/android-debug-symbols (workflow_dispatch
# requires the file to exist on the default branch, which we want to avoid for a
# one-off job that touches secrets).

on:
    push:
        branches:
            - feat/android-debug-symbols
        paths:
            - .github/workflows/pepk-extract.yml

permissions:
    contents: read

jobs:
    pepk-extract:
        runs-on: ubuntu-latest
        steps:
            - name: Checkout repository
              uses: actions/checkout@v4

            - name: Setup Java
              uses: actions/setup-java@v4
              with:
                  distribution: temurin
                  java-version: '21'

            - name: Decode keystore
              env:
                  ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
              run: |
                  echo "$ANDROID_KEYSTORE_BASE64" | base64 --decode > origa-release.keystore
                  ls -la origa-release.keystore

            - name: List keystore entries and verify signer
              env:
                  KEYSTORE_PASS: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
              run: |
                  echo "=== Keystore entries (alias names) ==="
                  keytool -list \
                    -keystore origa-release.keystore \
                    -storepass "$KEYSTORE_PASS" 2>&1 | tee keystore-entries.txt
                  echo ""
                  echo "=== Detailed signer info (CN, fingerprints) ==="
                  keytool -list -v \
                    -keystore origa-release.keystore \
                    -storepass "$KEYSTORE_PASS" 2>&1 | tee signer-info.txt
                  echo ""
                  echo "=== Verify match with AAB signer ==="
                  echo "Expected (from origa-0.4.4-rc2.aab):"
                  echo "  SHA256: 5A:E9:B7:20:04:C9:45:14:9F:45:65:56:AC:57:05:26:F7:C3:9E:D3:84:FB:48:51:D7:C7:CE:8D:74:E5:C5:1B"
                  echo "  CN=Origa, OU=Development, O=Origa, L=Moscow, ST=Moscow, C=RU"
                  echo ""
                  echo "If the SHA256 above does NOT match the keystore output, the keystore"
                  echo "in secrets is not the one that signed the released AAB."

            - name: Download pepk.jar
              run: |
                  curl -fL -o pepk.jar \
                    https://www.gstatic.com/play-apps-publisher-rapid/signing-tool/prod/pepk.jar
                  ls -la pepk.jar
                  echo "=== pepk.jar --help ==="
                  java -jar pepk.jar --help 2>&1 | head -40 || true

            - name: Install expect
              run: |
                  sudo apt-get update
                  sudo apt-get install -y expect

            - name: Run PEPK tool via expect
              env:
                  KEYSTORE_PASS: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
                  KEY_PASS: ${{ secrets.ANDROID_KEY_PASSWORD }}
                  KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
              run: |
                  set -e
                  # pepk.jar uses java.io.Console.readPassword() which returns null in
                  # CI (no TTY). expect allocates a pseudo-tty so Console works.
                  # Prompt order is: keystore password first, then key alias password.
                  cat > /tmp/pepk.expect <<'EXPECT_EOF'
                  #!/usr/bin/expect -f
                  set timeout 60
                  set keystore_pass [lindex $argv 0]
                  set key_pass      [lindex $argv 1]
                  set key_alias     [lindex $argv 2]
                  spawn java -jar pepk.jar \
                    --keystore origa-release.keystore \
                    --alias $key_alias \
                    --output pepk_out.zip \
                    --encryptionkey=0000a58b0431d440a99bfb021dca1ac1b6458ff49aea886e0adc2dcaab167e648f6525e17fde1e255888073f2e2cb64daaf29f8898bb5f8aa630d1c2fd2fd419a34c4e4a \
                    --include-cert
                  set pw_idx 0
                  expect {
                      -re "(?i)password" {
                          if {$pw_idx == 0} {
                              send "$keystore_pass\r"
                          } else {
                              send "$key_pass\r"
                          }
                          incr pw_idx
                          exp_continue
                      }
                      "Error" { exit 1 }
                      eof
                  }
                  catch wait result
                  exit [lindex $result 3]
                  EXPECT_EOF
                  chmod +x /tmp/pepk.expect
                  /tmp/pepk.expect "$KEYSTORE_PASS" "$KEY_PASS" "$KEY_ALIAS"
                  ls -la pepk_out.zip
                  echo "PEPK extraction complete — pepk_out.zip ready for Google Play App Signing."

            - name: Export RuStore signing certificate
              env:
                  KEYSTORE_PASS: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
                  KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
              run: |
                  set -e
                  # RuStore Console requires the app's public signing certificate
                  # to be uploaded to "App signing keys" before AAB upload is allowed.
                  # We export in two formats to cover any Console UI variant:
                  #   - PEM (RFC 7468, text with -----BEGIN CERTIFICATE-----) — most common
                  #   - DER (binary) — fallback
                  echo "=== PEM format (text) ==="
                  keytool -exportcert \
                    -keystore origa-release.keystore \
                    -alias "$KEY_ALIAS" \
                    -file rustore-signing-cert.pem \
                    -rfc \
                    -storepass "$KEYSTORE_PASS"
                  ls -la rustore-signing-cert.pem
                  echo "--- PEM preview (first/last lines) ---"
                  head -1 rustore-signing-cert.pem
                  echo "...($(wc -l < rustore-signing-cert.pem) lines total)..."
                  tail -1 rustore-signing-cert.pem

                  echo ""
                  echo "=== DER format (binary) ==="
                  keytool -exportcert \
                    -keystore origa-release.keystore \
                    -alias "$KEY_ALIAS" \
                    -file rustore-signing-cert.der \
                    -storepass "$KEYSTORE_PASS"
                  ls -la rustore-signing-cert.der

                  echo ""
                  echo "=== Verify cert SHA256 matches AAB signer ==="
                  openssl x509 -in rustore-signing-cert.pem -noout -fingerprint -sha256
                  echo "Expected: 5A:E9:B7:20:04:C9:45:14:9F:45:65:56:AC:57:05:26:F7:C3:9E:D3:84:FB:48:51:D7:C7:CE:8D:74:E5:C5:1B"

            - name: Upload artifacts
              uses: actions/upload-artifact@v4
              with:
                  name: pepk-and-keystore
                  path: |
                      pepk_out.zip
                      origa-release.keystore
                      signer-info.txt
                      keystore-entries.txt
                      rustore-signing-cert.pem
                      rustore-signing-cert.der
                  retention-days: 1
