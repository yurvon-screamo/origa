name: Build Tauri Apps

on:
    workflow_call:
        inputs:
            version:
                type: string
                required: true
            # version_base and version_type are retained for caller
            # compatibility (ci.yml and tauri.yml pass them) but are no longer
            # consumed inside this workflow after ADR-025: artifact naming is
            # unconditional (always versioned + fixed alias), and update-version
            # receives the full `version` so prerelease binaries report their
            # rc suffix. Kept as required to avoid a contract-breaking change
            # to the workflow_call signature in the same PR.
            version_base:
                type: string
                required: true
            version_type:
                type: string
                required: true
            commit_sha:
                type: string
                required: true
            build_date:
                type: string
                required: true
            wasm_artifact_name:
                type: string
                required: true
            platforms:
                type: string
                default: "windows,linux,macos,android"
            skip_android:
                type: boolean
                default: false
        secrets:
            tauri-signing-private-key:
                required: false
            tauri-signing-private-key-password:
                required: false
            android-keystore-base64:
                required: false
            android-keystore-password:
                required: false
            android-key-password:
                required: false
            android-key-alias:
                required: false
        outputs:
            windows-signature:
                value: ${{ jobs.build-windows.outputs.signature }}
            linux-signature:
                value: ${{ jobs.build-linux.outputs.signature }}
            macos-signature:
                value: ${{ jobs.build-macos.outputs.signature }}

env:
    CARGO_TERM_COLOR: always

# cargo tauri build does NOT execute origa_ui/build.rs or beforeBuildCommand.
# It simply bundles the pre-built frontendDist from origa_ui/dist/.

jobs:
    build-windows:
        name: Build Windows
        if: contains(inputs.platforms, 'windows')
        runs-on: ubuntu-latest
        container:
            image: ghcr.io/rust-cross/cargo-zigbuild
        permissions:
            contents: read
        outputs:
            signature: ${{ steps.signature.outputs.signature }}
        env:
            ORIGA_VERSION: ${{ inputs.version }}
            ORIGA_COMMIT: ${{ inputs.commit_sha }}
            ORIGA_BUILD_DATE: ${{ inputs.build_date }}
            # Skip updater signing for Dependabot PRs. GitHub hides repository
            # `secrets.*` from Dependabot runs, but caller workflows pass a
            # dummy private key via `vars.TAURI_CI_DUMMY_PRIVATE_KEY` (vars are
            # visible to Dependabot). The dummy key reaches the build, yet its
            # password is empty — Tauri fails with "incorrect updater private
            # key password: Wrong password for that key". Short-circuiting to
            # an empty value makes Tauri skip the updater signing step entirely,
            # which is the desired behaviour for compile-only verification.
            TAURI_SIGNING_PRIVATE_KEY: ${{ github.actor != 'dependabot[bot]' && secrets.tauri-signing-private-key || '' }}
            TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ github.actor != 'dependabot[bot]' && secrets.tauri-signing-private-key-password || '' }}
            XWIN_CACHE_DIR: ${{ github.workspace }}/.xwin-cache

        steps:
            - name: Checkout repository
              uses: actions/checkout@v4

            - name: Download WASM artifact
              uses: actions/download-artifact@v8
              with:
                  name: ${{ inputs.wasm_artifact_name }}
                  path: origa_ui/dist/

            - name: Setup cargo cache
              uses: Swatinem/rust-cache@v2
              with:
                  cache-all-crates: false
                  cache-targets: false
                  shared-key: origa-cross-build-v2
                  save-if: ${{ github.ref == 'refs/heads/master' }}

            - name: Update version in config files
              uses: ./.github/actions/update-version
              with:
                  version: ${{ inputs.version }}

            - name: Install build dependencies
              run: apt-get update && apt-get install -y nsis clang lld llvm protobuf-compiler

            - name: Setup Rust targets
              run: rustup target add x86_64-pc-windows-msvc

            - name: Install cargo-binstall
              run: |
                  tmp=$(mktemp) && curl -L --proto '=https' --tlsv1.2 -sSf -o "$tmp" https://raw.githubusercontent.com/cargo-bins/cargo-binstall/main/install-from-binstall-release.sh && bash "$tmp"
                  cargo binstall tauri-cli cargo-xwin --no-confirm --force

            - name: Add cargo bin to PATH
              run: echo "$HOME/.cargo/bin" >> $GITHUB_PATH

            - name: Cache cargo-xwin MSVC CRT
              uses: actions/cache@v4
              with:
                  path: ${{ github.workspace }}/.xwin-cache
                  key: xwin-${{ runner.os }}-x86_64-pc-windows-msvc-v17
                  restore-keys: |
                      xwin-${{ runner.os }}-

            - name: Build Tauri app for Windows
              working-directory: tauri
              run: cargo tauri build --runner cargo-xwin --target x86_64-pc-windows-msvc
              env:
                  TAURI_BUNDLE_NSIS: "true"

            - name: Create fixed-name alias
              working-directory: target/x86_64-pc-windows-msvc/release/bundle/nsis
              env:
                  VERSION: ${{ inputs.version }}
              run: |
                  # Tauri emits Origa_<version>_x64-setup.exe (+ .exe.sig updater
                  # signature). Rename to a fixed name so the landing page's
                  # /releases/latest/download/Origa_x64-setup.exe link resolves on
                  # every release — GitHub's "latest" download URL requires a
                  # filename that does not change between releases. Single-name
                  # (no versioned copy) per ADR-025 addendum: the release tag
                  # already identifies the version, and duplicate assets clutter
                  # the release UI.
                  mv "Origa_${VERSION}_x64-setup.exe" "Origa_x64-setup.exe"
                  [ -f "Origa_${VERSION}_x64-setup.exe.sig" ] && mv "Origa_${VERSION}_x64-setup.exe.sig" "Origa_x64-setup.exe.sig" || true

            - name: Extract signature
              id: signature
              shell: bash
              run: |
                  SIG_FILE=$(ls target/x86_64-pc-windows-msvc/release/bundle/nsis/*.sig 2>/dev/null | head -1 || true)
                  if [ -n "$SIG_FILE" ] && [ -f "$SIG_FILE" ]; then
                    SIG_CONTENT=$(cat "$SIG_FILE")
                    echo "signature=${SIG_CONTENT}" >> $GITHUB_OUTPUT
                  else
                    echo "signature=" >> $GITHUB_OUTPUT
                  fi

            - name: Upload Windows artifacts
              uses: actions/upload-artifact@v4
              with:
                  name: windows-build
                  path: |
                      **/bundle/nsis/*.exe
                      **/bundle/nsis/*.sig
                  retention-days: 7

    build-linux:
        name: Build Linux
        if: contains(inputs.platforms, 'linux')
        runs-on: ubuntu-24.04
        permissions:
            contents: read
        outputs:
            signature: ${{ steps.signature.outputs.signature }}
        env:
            ORIGA_VERSION: ${{ inputs.version }}
            ORIGA_COMMIT: ${{ inputs.commit_sha }}
            ORIGA_BUILD_DATE: ${{ inputs.build_date }}
            # Skip updater signing for Dependabot PRs — see build-windows for
            # the full rationale.
            TAURI_SIGNING_PRIVATE_KEY: ${{ github.actor != 'dependabot[bot]' && secrets.tauri-signing-private-key || '' }}
            TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ github.actor != 'dependabot[bot]' && secrets.tauri-signing-private-key-password || '' }}

        steps:
            - name: Checkout repository
              uses: actions/checkout@v4

            - name: Download WASM artifact
              uses: actions/download-artifact@v8
              with:
                  name: ${{ inputs.wasm_artifact_name }}
                  path: origa_ui/dist/

            - name: Update version in config files
              uses: ./.github/actions/update-version
              with:
                  version: ${{ inputs.version }}

            - name: Cache APT packages
              uses: awalsh128/cache-apt-pkgs-action@v1.6.1
              with:
                  packages:
                      libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf
                      protobuf-compiler libspeechd-dev
                  version: 1.0

            - name: Install mold linker
              uses: rui314/setup-mold@v1

            - name: Setup Rust with caching
              uses: ./.github/actions/setup-rust
              with:
                  targets: x86_64-unknown-linux-gnu
                  shared-key: origa-linux-v2
                  save-if: ${{ github.ref == 'refs/heads/master' }}

            - name: Setup frontend tools
              uses: ./.github/actions/setup-frontend
              with:
                  tools: tauri-cli

            - name: Add cargo bin to PATH
              run: echo "$HOME/.cargo/bin" >> $GITHUB_PATH

            - name: Build Tauri app for Linux
              working-directory: tauri
              run: cargo tauri build --target x86_64-unknown-linux-gnu

            - name: Create fixed-name aliases
              working-directory: target/x86_64-unknown-linux-gnu/release/bundle
              env:
                  VERSION: ${{ inputs.version }}
              run: |
                  # Tauri emits Origa_<version>_amd64.AppImage/.deb (+ .AppImage.sig
                  # updater signature). Rename each to a fixed name for the
                  # landing page's /releases/latest/download/<fixed> links.
                  # Single-name (no versioned copy) per ADR-025 addendum.
                  mv "appimage/Origa_${VERSION}_amd64.AppImage" "appimage/Origa_amd64.AppImage"
                  [ -f "appimage/Origa_${VERSION}_amd64.AppImage.sig" ] && mv "appimage/Origa_${VERSION}_amd64.AppImage.sig" "appimage/Origa_amd64.AppImage.sig" || true
                  mv "deb/Origa_${VERSION}_amd64.deb" "deb/Origa_amd64.deb"

            - name: Extract signature
              id: signature
              shell: bash
              run: |
                  SIG_FILE=$(ls target/x86_64-unknown-linux-gnu/release/bundle/appimage/*.sig 2>/dev/null | head -1 || true)
                  if [ -n "$SIG_FILE" ] && [ -f "$SIG_FILE" ]; then
                    SIG_CONTENT=$(cat "$SIG_FILE")
                    echo "signature=${SIG_CONTENT}" >> $GITHUB_OUTPUT
                  else
                    echo "signature=" >> $GITHUB_OUTPUT
                  fi

            - name: Upload Linux artifacts
              uses: actions/upload-artifact@v4
              with:
                  name: linux-build
                  path: |
                      **/bundle/appimage/*.AppImage
                      **/bundle/appimage/*.sig
                      **/bundle/deb/*.deb
                  retention-days: 7

    build-macos:
        name: Build macOS
        if: contains(inputs.platforms, 'macos')
        runs-on: ubuntu-latest
        container:
            image: ghcr.io/rust-cross/cargo-zigbuild
        permissions:
            contents: read
        outputs:
            signature: ${{ steps.signature.outputs.signature }}
        env:
            ORIGA_VERSION: ${{ inputs.version }}
            ORIGA_COMMIT: ${{ inputs.commit_sha }}
            ORIGA_BUILD_DATE: ${{ inputs.build_date }}
            # Skip updater signing for Dependabot PRs — see build-windows for
            # the full rationale.
            TAURI_SIGNING_PRIVATE_KEY: ${{ github.actor != 'dependabot[bot]' && secrets.tauri-signing-private-key || '' }}
            TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ github.actor != 'dependabot[bot]' && secrets.tauri-signing-private-key-password || '' }}

        steps:
            - name: Checkout repository
              uses: actions/checkout@v4

            - name: Download WASM artifact
              uses: actions/download-artifact@v8
              with:
                  name: ${{ inputs.wasm_artifact_name }}
                  path: origa_ui/dist/

            - name: Setup cargo cache
              uses: Swatinem/rust-cache@v2
              with:
                  cache-all-crates: false
                  cache-targets: false
                  shared-key: origa-cross-build-v2
                  save-if: ${{ github.ref == 'refs/heads/master' }}

            - name: Update version in config files
              uses: ./.github/actions/update-version
              with:
                  version: ${{ inputs.version }}

            - name: Install build dependencies
              run: apt-get update && apt-get install -y zip protobuf-compiler

            - name: Setup Rust targets
              run: rustup target add aarch64-apple-darwin

            - name: Install cargo-binstall
              run: |
                  tmp=$(mktemp) && curl -L --proto '=https' --tlsv1.2 -sSf -o "$tmp" https://raw.githubusercontent.com/cargo-bins/cargo-binstall/main/install-from-binstall-release.sh && bash "$tmp"
                  cargo binstall tauri-cli --no-confirm --force

            - name: Add cargo bin to PATH
              run: echo "$HOME/.cargo/bin" >> $GITHUB_PATH

            - name: Build Tauri app for macOS
              working-directory: tauri
              run:
                  cargo tauri build --runner cargo-zigbuild --target aarch64-apple-darwin
                  --no-bundle

            - name: Extract signature
              id: signature
              shell: bash
              run: echo "signature=" >> $GITHUB_OUTPUT

            - name: Create macOS app bundle
              run: |
                  mkdir -p Origa.app/Contents/MacOS
                  mkdir -p Origa.app/Contents/Resources
                  cp target/aarch64-apple-darwin/release/origa-app Origa.app/Contents/MacOS/origa
                  cat > Origa.app/Contents/Info.plist << EOF
                  <?xml version="1.0" encoding="UTF-8"?>
                  <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
                  <plist version="1.0">
                  <dict>
                    <key>CFBundleIdentifier</key>
                    <string>net.uwuwu.origa</string>
                    <key>CFBundleName</key>
                    <string>Origa</string>
                    <key>CFBundleDisplayName</key>
                    <string>Origa</string>
                    <key>CFBundleVersion</key>
                    <string>${{ inputs.version }}</string>
                    <key>CFBundleShortVersionString</key>
                    <string>${{ inputs.version }}</string>
                    <key>CFBundleExecutable</key>
                    <string>origa</string>
                    <key>CFBundlePackageType</key>
                    <string>APPL</string>
                  </dict>
                  </plist>
                  EOF
                  chmod +x Origa.app/Contents/MacOS/origa
                  # Single fixed-name archive for the landing page's
                  # /releases/latest/download/Origa_macos-arm64.zip link, and as
                  # the only macOS asset in the release (no versioned duplicate)
                  # per ADR-025 addendum.
                  zip -r "Origa_macos-arm64.zip" Origa.app

            - name: Upload macOS artifacts
              uses: actions/upload-artifact@v4
              with:
                  name: macos-build
                  path: |
                      Origa_macos-arm64.zip
                  retention-days: 7

    build-android:
        name: Build Android
        # Defense-in-depth: caller workflows already pass `skip_android: true`
        # for Dependabot, but adding the actor check here makes this reusable
        # workflow self-sufficient — Android release APKs cannot build without a
        # valid keystore, which GitHub never exposes to Dependabot runs. See
        # build-windows for the broader signing-secret rationale.
        if: contains(inputs.platforms, 'android') && inputs.skip_android != true && github.actor != 'dependabot[bot]'
        runs-on: ubuntu-24.04
        permissions:
            contents: read
        env:
            ORIGA_VERSION: ${{ inputs.version }}
            ORIGA_COMMIT: ${{ inputs.commit_sha }}
            ORIGA_BUILD_DATE: ${{ inputs.build_date }}
            # NDK r26b exact version. Single source of truth — referenced by both
            # the sdkmanager `packages` input and the NDK env-var derivation below.
            NDK_VERSION: '26.1.10909125'

        steps:
            - name: Checkout repository
              uses: actions/checkout@v4

            - name: Download WASM artifact
              uses: actions/download-artifact@v8
              with:
                  name: ${{ inputs.wasm_artifact_name }}
                  path: origa_ui/dist/

            - name: Update version in config files
              uses: ./.github/actions/update-version
              with:
                  version: ${{ inputs.version }}

            - name: Install system dependencies
              run: |
                  sudo apt-get update
                  sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf protobuf-compiler

            - name: Setup Rust with caching
              uses: ./.github/actions/setup-rust
              with:
                  targets: aarch64-linux-android
                  shared-key: origa-mobile-v2
                  save-if: ${{ github.ref == 'refs/heads/master' }}

            - name: Setup Java
              uses: actions/setup-java@v4
              with:
                  distribution: temurin
                  java-version: 21

            - name: Setup Android SDK + NDK
              uses: android-actions/setup-android@v4
              with:
                  packages: 'tools platform-tools ndk;${{ env.NDK_VERSION }}'

            - name: Configure NDK environment
              # setup-android@v4 exports ANDROID_SDK_ROOT/ANDROID_HOME but NOT
              # NDK_HOME/ANDROID_NDK_ROOT. NDK installs under
              # ${ANDROID_SDK_ROOT}/ndk/<version>/ (standard sdkmanager layout).
              # Fail fast with diagnostics if the expected path is missing, rather
              # than letting cc-rs/ring fail later with a confusing clang error.
              run: |
                  NDK_PATH="${ANDROID_SDK_ROOT}/ndk/${{ env.NDK_VERSION }}"
                  if [ ! -d "$NDK_PATH" ]; then
                      echo "ERROR: NDK directory not found at: $NDK_PATH"
                      echo "Available NDK versions under \${ANDROID_SDK_ROOT}/ndk/:"
                      ls -1 "${ANDROID_SDK_ROOT}/ndk/" 2>/dev/null || echo "(ndk directory does not exist)"
                      exit 1
                  fi
                  echo "NDK_HOME=$NDK_PATH" >> $GITHUB_ENV
                  echo "ANDROID_NDK_ROOT=$NDK_PATH" >> $GITHUB_ENV

            - name: Cache Gradle
              uses: actions/cache@v4
              with:
                  path: |
                      ~/.gradle/caches
                      ~/.gradle/wrapper
                  key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*',
                      '**/gradle-wrapper.properties') }}
                  restore-keys: |
                      ${{ runner.os }}-gradle-

            - name: Setup frontend tools
              uses: ./.github/actions/setup-frontend
              with:
                  tools: tauri-cli

            - name: Add cargo bin to PATH
              run: echo "$HOME/.cargo/bin" >> $GITHUB_PATH

            - name: Decode Android Keystore
              env:
                  ANDROID_KEYSTORE_BASE64: ${{ secrets.android-keystore-base64 }}
              run: |
                  echo "Decoding Android keystore..."
                  echo "$ANDROID_KEYSTORE_BASE64" | base64 --decode > /tmp/keystore.jks
                  echo "Keystore decoded successfully"

            - name: Configure Android Signing
              working-directory: tauri/gen/android
              run: |
                  cat > keystore.properties << EOF
                  storePassword=${{ secrets.android-keystore-password }}
                  keyPassword=${{ secrets.android-key-password }}
                  keyAlias=${{ secrets.android-key-alias }}
                  storeFile=/tmp/keystore.jks
                  EOF

            - name: Install Tauri CLI (npm)
              working-directory: tauri
              run: npm install

            - name: Build Tauri Android APK
              # NDK_HOME and ANDROID_NDK_ROOT are injected globally via $GITHUB_ENV
              # by the "Configure NDK environment" step above.
              working-directory: tauri
              run: |
                  echo "=== Debug info ==="
                  echo "NDK_HOME=$NDK_HOME"
                  echo "ANDROID_NDK_ROOT=$ANDROID_NDK_ROOT"
                  echo "=== Start build ==="
                  cargo tauri android build 2>&1 || (echo "Build failed with exit code $?"; exit 1)

            - name: Rename APK to fixed-name output
              working-directory: tauri/gen/android/app/build/outputs/apk
              run: |
                  # Gradle emits app-universal-release.apk under a per-ABI subdir
                  # (e.g. universal/release/), whose depth varies across AGP/
                  # Tauri versions — locate it with `find` instead of a fixed
                  # `release/*.apk` glob, then rename to the fixed name used by
                  # /releases/latest/download/origa.apk. The default Gradle name
                  # is excluded from the release by the explicit upload path below
                  # (the publish job copies every *.apk).
                  src=$(find . -name "*.apk" -type f | head -1)
                  if [ -z "$src" ] || [ ! -f "$src" ]; then
                    echo "::error::No APK produced by Gradle under $(pwd)"
                    echo "--- Files under $(pwd) ---"
                    find . -type f | head -30 || true
                    exit 1
                  fi
                  cp "$src" "origa.apk"

            - name: Upload Android APK
              uses: actions/upload-artifact@v4
              with:
                  name: android-apk
                  path: |
                      tauri/gen/android/app/build/outputs/apk/origa.apk
                  retention-days: 7
