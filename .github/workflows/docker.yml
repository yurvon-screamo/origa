name: Build and Push Docker Image

on:
    push:
        branches:
            - master
        tags:
            - 'v*.*.*'
    workflow_dispatch:

env:
    REGISTRY: ghcr.io
    IMAGE_NAME: ${{ github.repository }}

permissions: {}

jobs:
    version:
        permissions:
            contents: read
        uses: ./.github/workflows/version.yml

    build-and-push:
        name: Build and Push Docker Image
        needs: [version]
        runs-on: ubuntu-latest
        permissions:
            contents: read
            packages: write

        steps:
            - name: Checkout repository
              uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
              with:
                  persist-credentials: false

            - name: Set up Docker Buildx
              uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3.12.0

            - name: Login to GitHub Container Registry
              uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3.7.0
              with:
                  registry: ${{ env.REGISTRY }}
                  username: ${{ github.actor }}
                  password: ${{ secrets.GITHUB_TOKEN }}

            - name: Extract metadata (tags, labels)
              id: meta
              uses: docker/metadata-action@c299e40c65443455700f0fdfc63efafe5b349051 # v5.10.0
              with:
                  images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
                  tags: |
                      type=raw,value=latest,enable=${{ github.ref == 'refs/heads/master' }}
                      type=raw,value=${{ needs.version.outputs.version }}
                      type=sha,prefix=

            - name: Build and push Docker image
              uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6.19.2
              with:
                  context: .
                  file: ./origa_ui/Dockerfile
                  push: true
                  tags: ${{ steps.meta.outputs.tags }}
                  labels: ${{ steps.meta.outputs.labels }}
                  cache-from: type=registry,ref=ghcr.io/yurvon-screamo/origa:buildcache
                  cache-to: type=registry,ref=ghcr.io/yurvon-screamo/origa:buildcache,mode=max
                  provenance: false
                  build-args: |
                      ORIGA_VERSION=${{ needs.version.outputs.version }}
                      ORIGA_COMMIT=${{ needs.version.outputs.commit_sha }}
                      ORIGA_BUILD_DATE=${{ needs.version.outputs.build_date }}

    deploy-to-railway:
        name: Deploy to Railway
        needs: [version, build-and-push]
        if: success()
        runs-on: ubuntu-latest
        permissions: {}
        container:
            image: ghcr.io/railwayapp/cli:v4.31.0@sha256:4586b24e9aed23ce1acdd36840182262be9c8b0f94db5aff97845487c3f77661
        env:
            RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
            RAILWAY_SERVICE_ID: ${{ secrets.RAILWAY_SERVICE_ID }}
        steps:
            - name: Trigger Railway redeploy
              run: railway redeploy -y --service "$RAILWAY_SERVICE_ID"
