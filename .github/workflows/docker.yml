name: Build and Push Docker Images

on:
    push:
        tags:
            - "v*.*.*"
    workflow_dispatch:

concurrency:
    group: docker-${{ github.ref }}
    cancel-in-progress: true

env:
    REGISTRY: ghcr.io
    IMAGE_NAME: ${{ github.repository }}

jobs:
    require-ci-green:
        name: Require CI green
        runs-on: ubuntu-latest
        permissions:
            actions: read
        steps:
            - name: Verify CI passed for this commit
              env:
                  GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
                  EVENT: ${{ github.event_name }}
              run: |
                  # workflow_dispatch is an operator escape-hatch: trust the
                  # operator, skip the CI gate. Automatic tag-push CD requires
                  # the commit's full CI (lint+test+e2e+build-tauri+docker-build)
                  # to be green first, restoring the invariant the previous
                  # workflow_run trigger implicitly enforced.
                  if [ "$EVENT" != "push" ]; then
                    echo "Manual dispatch ($EVENT) — bypassing CI gate"
                    exit 0
                  fi

                  RUN_ID=$(gh run list \
                    --repo ${{ github.repository }} \
                    --workflow ci.yml \
                    --commit "${{ github.sha }}" \
                    --status success \
                    --limit 1 \
                    --json databaseId \
                    --jq '.[0].databaseId' 2>/dev/null || echo "")

                  if [ -z "$RUN_ID" ]; then
                    echo "::error::No successful CI run found for commit ${{ github.sha }}. Tag-triggered CD requires a green CI run first."
                    exit 1
                  fi
                  echo "CI run $RUN_ID is green for ${{ github.sha }}"

    version:
        permissions:
            contents: read
        needs: [require-ci-green]
        runs-on: ubuntu-latest
        outputs:
            version: ${{ steps.version.outputs.version }}
            version_base: ${{ steps.version.outputs.version_base }}
            version_type: ${{ steps.version.outputs.version_type }}
            commit_sha: ${{ steps.version.outputs.commit_sha }}
            commit_short: ${{ steps.version.outputs.commit_short }}
            build_date: ${{ steps.version.outputs.build_date }}
        steps:
            - uses: actions/checkout@v4
              with:
                  fetch-depth: 0
                  filter: blob:none

            - name: Calculate version
              id: version
              uses: ./.github/actions/version

    build-and-push:
        name: Build and Push (${{ matrix.image }})
        needs: [require-ci-green, version]
        runs-on: ubuntu-latest
        permissions:
            contents: read
            packages: write
        strategy:
            fail-fast: false
            matrix:
                include:
                    - image: landing
                      dockerfile: ./origa_landing/Dockerfile
                      build_args: |
                          ORIGA_LANDING_BASE_URL=https://${{ vars.ORIGA_BASE_URI }}
                          ORIGA_APP_BASE_URL=https://${{ vars.ORIGA_APP_URI_PREFIX }}.${{ vars.ORIGA_BASE_URI }}
                          ORIGA_BUILD_DATE=${{ needs.version.outputs.build_date }}
                    - image: ui
                      dockerfile: ./origa_ui/Dockerfile
                      build_args: |
                          ORIGA_VERSION=${{ needs.version.outputs.version }}
                          ORIGA_COMMIT=${{ needs.version.outputs.commit_sha }}
                          ORIGA_BUILD_DATE=${{ needs.version.outputs.build_date }}
                          ORIGA_CDN_BASE_URL=https://${{ vars.ORIGA_CDN_URI_PREFIX }}.${{ vars.ORIGA_BASE_URI }}
                          ORIGA_CDN_REGION=${{ vars.ORIGA_CDN_REGION }}
                          TRAILBASE_URL=https://${{ vars.ORIGA_APP_URI_PREFIX }}.${{ vars.ORIGA_BASE_URI }}

        steps:
            - name: Checkout repository
              uses: actions/checkout@v4

            - name: Set up Docker Buildx
              uses: docker/setup-buildx-action@v3

            - name: Login to GitHub Container Registry
              uses: docker/login-action@v4
              with:
                  registry: ${{ env.REGISTRY }}
                  username: ${{ github.actor }}
                  password: ${{ secrets.GITHUB_TOKEN }}

            - name: Extract metadata (tags, labels)
              id: meta
              uses: docker/metadata-action@v6
              with:
                  images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/${{ matrix.image }}
                  tags: |
                      type=raw,value=latest,enable=${{ needs.version.outputs.version_type == 'stable' }}
                      type=raw,value=${{ needs.version.outputs.version }}
                      type=sha,prefix=

            - name: Build and push Docker image
              uses: docker/build-push-action@v6
              with:
                  context: .
                  file: ${{ matrix.dockerfile }}
                  push: true
                  tags: ${{ steps.meta.outputs.tags }}
                  labels: ${{ steps.meta.outputs.labels }}
                  cache-from: type=registry,ref=ghcr.io/yurvon-screamo/origa:${{ matrix.image }}-buildcache
                  cache-to: type=registry,ref=ghcr.io/yurvon-screamo/origa:${{ matrix.image }}-buildcache,mode=max
                  provenance: false
                  no-cache: true
                  build-args: ${{ matrix.build_args }}

    deploy-to-railway:
        name: Deploy to Railway
        permissions:
            contents: read
        needs: [require-ci-green, version, build-and-push]
        if: success() && startsWith(github.ref, 'refs/tags/v') && needs.version.outputs.version_type == 'stable'
        runs-on: ubuntu-latest
        container: ghcr.io/railwayapp/cli:latest
        steps:
            - name: Deploy landing
              run: railway redeploy -y --service ${{ secrets.RAILWAY_SERVICE_ID_LANDING }}
              env:
                  RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}

            - name: Deploy UI
              run: railway redeploy -y --service ${{ secrets.RAILWAY_SERVICE_ID_UI }}
              env:
                  RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
