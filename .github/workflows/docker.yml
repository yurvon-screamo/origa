name: Build and Push Docker Image

on:
    workflow_run:
        workflows: ["CI"]
        types: [completed]
        branches: [master]
    push:
        tags:
            - "v*.*.*"
    workflow_dispatch:

concurrency:
    group: docker-${{ github.ref }}
    cancel-in-progress: true

env:
    REGISTRY: ghcr.io
    IMAGE_NAME: ${{ github.repository }}

jobs:
    version:
        runs-on: ubuntu-latest
        outputs:
            version: ${{ steps.version.outputs.version }}
            version_base: ${{ steps.version.outputs.version_base }}
            version_type: ${{ steps.version.outputs.version_type }}
            commit_sha: ${{ steps.version.outputs.commit_sha }}
            commit_short: ${{ steps.version.outputs.commit_short }}
            build_date: ${{ steps.version.outputs.build_date }}
        steps:
            - uses: actions/checkout@v4
              with:
                  fetch-depth: 0
                  filter: blob:none

            - name: Calculate version
              id: version
              uses: ./.github/actions/version

    build-and-push:
        name: Build and Push Docker Image
        needs: [version]
        if: >
            github.event_name == 'push' ||
            github.event_name == 'workflow_dispatch' ||
            (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success')
        runs-on: ubuntu-latest
        permissions:
            contents: read
            packages: write

        steps:
            - name: Checkout repository
              uses: actions/checkout@v4

            - name: Set up Docker Buildx
              uses: docker/setup-buildx-action@v3

            - name: Login to GitHub Container Registry
              uses: docker/login-action@v3
              with:
                  registry: ${{ env.REGISTRY }}
                  username: ${{ github.actor }}
                  password: ${{ secrets.GITHUB_TOKEN }}

            - name: Extract metadata (tags, labels)
              id: meta
              uses: docker/metadata-action@v5
              with:
                  images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
                  tags: |
                      type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/tags/') }}
                      type=raw,value=edge,enable=${{ github.ref == 'refs/heads/master' }}
                      type=raw,value=${{ needs.version.outputs.version }}
                      type=sha,prefix=

            - name: Build and push Docker image
              uses: docker/build-push-action@v6
              with:
                  context: .
                  file: ./origa_ui/Dockerfile
                  push: true
                  tags: ${{ steps.meta.outputs.tags }}
                  labels: ${{ steps.meta.outputs.labels }}
                  cache-from: type=registry,ref=ghcr.io/yurvon-screamo/origa:buildcache
                  cache-to: type=registry,ref=ghcr.io/yurvon-screamo/origa:buildcache,mode=max
                  provenance: false
                  build-args: |
                      ORIGA_VERSION=${{ needs.version.outputs.version }}
                      ORIGA_COMMIT=${{ needs.version.outputs.commit_sha }}
                      ORIGA_BUILD_DATE=${{ needs.version.outputs.build_date }}
                      ORIGA_CDN_BASE_URL=${{ vars.ORIGA_CDN_BASE_URL }}
                      ORIGA_CDN_REGION=${{ vars.ORIGA_CDN_REGION }}
                      TRAILBASE_URL=${{ vars.TRAILBASE_URL }}

    deploy-to-railway:
        name: Deploy to Railway
        needs: [version, build-and-push]
        if: success()
        runs-on: ubuntu-latest
        container: ghcr.io/railwayapp/cli:latest
        env:
            RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
            RAILWAY_SERVICE_ID: ${{ secrets.RAILWAY_SERVICE_ID }}
        steps:
            - name: Trigger Railway redeploy
              run: railway redeploy -y --service ${{ env.RAILWAY_SERVICE_ID }}
