name: Reusable Release

on:
  workflow_call:
    inputs:
      release-name:
        description: "Name of the release"
        default: "Latest Build"
        type: string
      tag-name:
        description: "Tag for the release"
        default: "latest"
        type: string
      body:
        description: "Release body text"
        default: "Автоматическая сборка"
        type: string
      version-type:
        description: "Version type (dev, stable, etc.)"
        default: "dev"
        type: string
      make-latest:
        description: "Mark as latest release"
        default: false
        type: boolean
      prerelease:
        description: "Mark as prerelease"
        default: false
        type: boolean

jobs:
  release:
    name: Create/Update Release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          path: artifacts

      - name: Prepare release assets
        run: |
          mkdir -p release_assets
          # Move all files from all artifact subdirectories to release_assets/
          find artifacts -type f -exec mv {} release_assets/ \;
          echo "Release assets content:"
          ls -la release_assets/

      - name: Update latest release
        uses: softprops/action-gh-release@a06a81a03ee405af7f2048a818ed3f03bbf83c7b # v2.5.0
        with:
          tag_name: ${{ inputs.tag-name }}
          name: ${{ inputs.release-name }}
          body: ${{ inputs.body }}
          files: release_assets/*
          prerelease: ${{ inputs.prerelease }}
          draft: false
          make_latest: ${{ inputs.make-latest }}
