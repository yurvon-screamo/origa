[workspace]
members = ["origa", "tokenizer", "origa_ui", "tauri"]
resolver = "2"

[workspace.package]
version = "0.1.0"
edition = "2024"
authors = ["yurvon-screamo <yurvon@ya.ru>"]
license-file = "LICENSE"
repository = "https://github.com/yurvon-screamo/origa"
readme = "README.md"

[workspace.dependencies]
# System
tokio = { version = "1.48", default-features = false, features = [
    "rt",
    "macros",
    "time",
] }
base64 = "0.22"
toml = "0.9"
tempfile = "3.25"
serde_json = "1.0"
serde-wasm-bindgen = "0.6"
reqwest = { version = "0.13", default-features = false, features = ["json"] }
zip = { version = "8.1", default-features = false }
regex = "1.12"
async-trait = "0.1"

# Logging
tracing = "0.1"

# OpenAI
async-openai-wasm = { version = "0.31", features = [
    "embedding",
    "responses",
    "batch",
    "model",
    "chat-completion",
] }

# Domain
ulid = { version = "1.2", features = ["serde"] }
serde = { version = "1.0", features = ["derive"] }
chrono = { version = "0.4", features = ["std", "clock", "serde"] }
rand = "0.9"

# Japan
rs-fsrs = "1.2"
lindera = { version = "2.2", default-features = false }
lindera-dictionary = { version = "2.2" }

# Origa workspace crates
origa = { path = "./origa" }
tokenizer = { path = "./tokenizer" }

# Utility
lazy_static = "1.4"
idb = "0.6"

# Testing
rstest = "0.26"

# UI
leptos = { version = "0.8", default-features = false, features = ["csr"] }
pulldown-cmark = "0.12"
ammonia = "4"
leptos_meta = { version = "0.8" }
leptos_router = { version = "0.8" }
leptos-use = { version = "0.18" }
js-sys = "0.3"
codee = { version = "0.3", features = ["json_serde"] }
console_log = "1"
log = "0.4"
console_error_panic_hook = "0.1"
gloo-storage = "0.3"
urlencoding = "2.1"

# Tauri
tauri = { version = "2", features = [] }
tauri-plugin-opener = "2"
tauri-build = { version = "2", features = [] }

# Dev Dependencies
wasm-bindgen = "0.2"
wasm-bindgen-test = "0.3"
wasm-bindgen-futures = { version = "0.4", features = [
    "futures-core-03-stream",
] }
web-sys = { version = "0.3", features = [
    "DedicatedWorkerGlobalScope",
    "DomException",
    "FileSystemDirectoryHandle",
    "FileSystemFileHandle",
    "FileSystemGetFileOptions",
    "FileSystemGetDirectoryOptions",
    "FileSystemHandle",
    "FileSystemHandleKind",
    "FileSystemHandlePermissionDescriptor",
    "FileSystemReadWriteOptions",
    "FileSystemRemoveOptions",
    "FileSystemSyncAccessHandle",
    "FileSystemWritableFileStream",
    "Navigator",
    "StorageManager",
    "WorkerNavigator",
    "File",
    "Blob",
    "Document",
    "Window",
    "Node",
    "Element",
    "console",
] }


[profile.release]
opt-level = 'z'
lto = "fat"
codegen-units = 1
panic = "abort"
strip = true
